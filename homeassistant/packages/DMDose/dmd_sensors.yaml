      # ============================================================
      #  Pump health — drift detection v1.0.5
      #
      #  Logique :
      #  Au remplissage l'utilisateur saisit (optionnel) :
      #    - volume restant avant remplissage
      #    - volume ajouté
      #
      #  Volume consommé réel sur la période =
      #    remaining_before + added - tank_volume_au_début
      #    = remaining_before_refill + added_volume - (prev_remaining)
      #
      #  En pratique :
      #    consumed = prev_remaining_before + added - remaining_before
      #    (ce que la pompe a pompé = ce qu'il y avait + ce qu'on a mis - ce qu'il reste maintenant)
      #
      #  real_daily_dose = consumed / days_between_refills
      #  drift_pct = (real - configured) / configured × 100
      # ============================================================

      dmd_p1_days_between_refills:
