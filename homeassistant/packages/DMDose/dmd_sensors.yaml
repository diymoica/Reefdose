        unit_of_measurement: "%"
        icon_template: mdi:percent
        value_template: >-
          {% set r = states('input_number.dmd_p2_tank_remaining') | float(0) %}
          {% set i = states('input_number.dmd_p2_tank_volume') | float(1) %}
          {{ [(r / i * 100) | round(1), 0] | max }}

      dmd_p2_days_remaining:
        friendly_name: "Pump 2 : Days remaining"
        unit_of_measurement: "j"
        icon_template: mdi:calendar-clock
        value_template: >-
          {% set r = states('input_number.dmd_p2_tank_remaining') | float(0) %}
          {% set d = states('input_number.dmd_p2_daily_dose') | float(1) %}
          {{ (r / d) | round(1) }}

      dmd_p3_flow_rate:
        friendly_name: "Pump 3 : Flow rate"
        unit_of_measurement: "ml/s"
        icon_template: mdi:speedometer
        value_template: >-
          {% set vol = states('input_number.dmd_p3_calib_volume') | float(0) %}
          {% set dur = states('input_number.dmd_p3_calib_duration') | float(1) %}
          {{ (vol / dur) | round(3) }}

      dmd_p3_dose_volume:
        friendly_name: "Pump 3 : Volume per dose"
        unit_of_measurement: "ml"
        icon_template: mdi:beaker
        value_template: >-
          {% set dose = states('input_number.dmd_p3_daily_dose') | float(0) %}
          {% set freq = states('input_number.dmd_p3_frequency') | float(1) %}
          {{ (dose / freq) | round(2) }}

      dmd_p3_dose_duration:
        friendly_name: "Pump 3 : Duration per dose"
        unit_of_measurement: "s"
        icon_template: mdi:timer
        value_template: >-
          {% set dose = states('input_number.dmd_p3_daily_dose') | float(0) %}
          {% set freq = states('input_number.dmd_p3_frequency') | float(1) %}
          {% set debit = states('sensor.dmd_p3_flow_rate') | float(0.001) %}
          {{ ((dose / freq) / debit) | round(1) }}

      dmd_p3_tank_pct:
        friendly_name_template: "{{ states('input_text.dmd_p3_name') }}"
        unit_of_measurement: "%"
        icon_template: mdi:percent
        value_template: >-
          {% set r = states('input_number.dmd_p3_tank_remaining') | float(0) %}
          {% set i = states('input_number.dmd_p3_tank_volume') | float(1) %}
          {{ [(r / i * 100) | round(1), 0] | max }}

      dmd_p3_days_remaining:
        friendly_name: "Pump 3 : Days remaining"
        unit_of_measurement: "j"
        icon_template: mdi:calendar-clock
        value_template: >-
          {% set r = states('input_number.dmd_p3_tank_remaining') | float(0) %}
          {% set d = states('input_number.dmd_p3_daily_dose') | float(1) %}
          {{ (r / d) | round(1) }}

      dmd_p4_flow_rate:
        friendly_name: "Pump 4 : Flow rate"
        unit_of_measurement: "ml/s"
        icon_template: mdi:speedometer
        value_template: >-
          {% set vol = states('input_number.dmd_p4_calib_volume') | float(0) %}
          {% set dur = states('input_number.dmd_p4_calib_duration') | float(1) %}
          {{ (vol / dur) | round(3) }}

      dmd_p4_dose_volume:
        friendly_name: "Pump 4 : Volume per dose"
        unit_of_measurement: "ml"
        icon_template: mdi:beaker
        value_template: >-
          {% set dose = states('input_number.dmd_p4_daily_dose') | float(0) %}
          {% set freq = states('input_number.dmd_p4_frequency') | float(1) %}
          {{ (dose / freq) | round(2) }}

      dmd_p4_dose_duration:
        friendly_name: "Pump 4 : Duration per dose"
        unit_of_measurement: "s"
        icon_template: mdi:timer
        value_template: >-
          {% set dose = states('input_number.dmd_p4_daily_dose') | float(0) %}
          {% set freq = states('input_number.dmd_p4_frequency') | float(1) %}
          {% set debit = states('sensor.dmd_p4_flow_rate') | float(0.001) %}
          {{ ((dose / freq) / debit) | round(1) }}

