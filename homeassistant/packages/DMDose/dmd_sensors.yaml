            {% if is_state('input_boolean.dmd_p2_full_day', 'on') %}
              {% set next_slot = ((now_min // interval) + 1) * interval %}
              {% if next_slot >= 1440 %}
                Tomorrow 00:00
              {% else %}
                {% set remaining = next_slot - now_min %}
                {% set h = (remaining // 60) | int %}
                {% set m = (remaining % 60) | int %}
                {% if h > 0 %}in {{ h }}h {{ m }}min{% else %}in {{ m }} min{% endif %}
              {% endif %}
            {% else %}
              {% set start_min = sh * 60 + sm %}
              {% set end_min = eh * 60 + em %}
              {% if now_min < start_min %}
                {% set remaining = start_min - now_min %}
                {% set h = (remaining // 60) | int %}
                {% set m = (remaining % 60) | int %}
                in {{ h }}h {{ m }}min (start)
              {% elif now_min > end_min %}
                Tomorrow {{ '%02d:%02d' | format(sh, sm) }}
              {% else %}
                {% set diff = now_min - start_min %}
                {% set remaining = interval - (diff % interval) %}
                {% if remaining == interval %}Now
                {% else %}
                  {% set h = (remaining // 60) | int %}
                  {% set m = (remaining % 60) | int %}
                  {% if h > 0 %}in {{ h }}h {{ m }}min{% else %}in {{ m }} min{% endif %}
                {% endif %}
              {% endif %}
            {% endif %}
          {% endif %}

      dmd_p3_interval_min:
