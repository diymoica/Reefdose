          {% elif (window / freq) < min_delay %}Too many doses for window
          {% else %}OK{% endif %}

      dmd_p2_next_dose:
        friendly_name: "Pump 2 : Next dose"
        icon_template: mdi:clock-outline
        value_template: >-
          {% if states('sensor.dmd_p2_window_ok') != 'OK' %}
            {{ states('sensor.dmd_p2_window_ok') }}
          {% else %}
            {% set freq = states('input_number.dmd_p2_frequency') | float(1) %}
            {% set sh = state_attr('input_datetime.dmd_p2_start_time', 'hour') | int(0) %}
