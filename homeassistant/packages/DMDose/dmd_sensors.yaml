          {% set freq = states('input_number.dmd_p4_frequency') | float(1) %}
          {% set debit = states('sensor.dmd_p4_flow_rate') | float(0.001) %}
          {{ ((dose / freq) / debit) | round(1) }}

      dmd_p4_max_duration:
        friendly_name: "Pump 4 : Max safe duration"
        unit_of_measurement: "s"
        icon_template: mdi:shield-lock
        value_template: >-
          {% set max_vol = states('input_number.dmd_p4_max_volume') | float(0) %}
          {% set flow = states('sensor.dmd_p4_flow_rate') | float(0) %}
          {% if max_vol <= 0 or flow <= 0 %}30
          {% else %}{{ [((max_vol / flow) | round(0) | int), 5] | max }}{% endif %}

      dmd_p4_tank_pct:
        friendly_name_template: "{{ states('input_text.dmd_p4_name') }}"
        unit_of_measurement: "%"
        icon_template: mdi:percent
        value_template: >-
          {% set r = states('input_number.dmd_p4_tank_remaining') | float(0) %}
          {% set i = states('input_number.dmd_p4_tank_volume') | float(1) %}
          {{ [(r / i * 100) | round(1), 0] | max }}

      dmd_p4_days_remaining:
        friendly_name: "Pump 4 : Days remaining"
        unit_of_measurement: "j"
        icon_template: mdi:calendar-clock
        value_template: >-
          {% set r = states('input_number.dmd_p4_tank_remaining') | float(0) %}
          {% set d = states('input_number.dmd_p4_daily_dose') | float(1) %}
          {{ (r / d) | round(1) }}

      # ============================================================
      #  Safety — ESP32 hardware timeout per pump (v1.0.0)
      #  = dose_duration × dmd_safety_esp32_mult
      #  Pushed to ESP32 number entity by dmd_push_max_duration
      # ============================================================
      dmd_p1_esp32_timeout:
        friendly_name: "Pump 1 : ESP32 hardware timeout"
        unit_of_measurement: "s"
        icon_template: mdi:shield-lock
        value_template: >-
          {%- set ov = states('input_number.dmd_p1_safety_esp32_mult') | float(0) %}
          {%- set gl = states('input_number.dmd_safety_esp32_mult') | float(6) %}
          {%- set mult = ov if ov > 0 else gl %}
          {%- set dur = states('sensor.dmd_p1_dose_duration') | float(0) %}
          {%- if dur <= 0 %}60
          {%- else %}{{ [(dur * mult) | round(0) | int, 5] | max }}{%- endif %}

      dmd_p2_esp32_timeout:
        friendly_name: "Pump 2 : ESP32 hardware timeout"
        unit_of_measurement: "s"
        icon_template: mdi:shield-lock
        value_template: >-
          {%- set ov = states('input_number.dmd_p2_safety_esp32_mult') | float(0) %}
          {%- set gl = states('input_number.dmd_safety_esp32_mult') | float(6) %}
          {%- set mult = ov if ov > 0 else gl %}
          {%- set dur = states('sensor.dmd_p2_dose_duration') | float(0) %}
          {%- if dur <= 0 %}60
          {%- else %}{{ [(dur * mult) | round(0) | int, 5] | max }}{%- endif %}

      dmd_p3_esp32_timeout:
        friendly_name: "Pump 3 : ESP32 hardware timeout"
        unit_of_measurement: "s"
        icon_template: mdi:shield-lock
        value_template: >-
          {%- set ov = states('input_number.dmd_p3_safety_esp32_mult') | float(0) %}
          {%- set gl = states('input_number.dmd_safety_esp32_mult') | float(6) %}
          {%- set mult = ov if ov > 0 else gl %}
          {%- set dur = states('sensor.dmd_p3_dose_duration') | float(0) %}
          {%- if dur <= 0 %}60
          {%- else %}{{ [(dur * mult) | round(0) | int, 5] | max }}{%- endif %}

      dmd_p4_esp32_timeout:
        friendly_name: "Pump 4 : ESP32 hardware timeout"
        unit_of_measurement: "s"
        icon_template: mdi:shield-lock
        value_template: >-
          {%- set ov = states('input_number.dmd_p4_safety_esp32_mult') | float(0) %}
          {%- set gl = states('input_number.dmd_safety_esp32_mult') | float(6) %}
          {%- set mult = ov if ov > 0 else gl %}
          {%- set dur = states('sensor.dmd_p4_dose_duration') | float(0) %}
          {%- if dur <= 0 %}60
          {%- else %}{{ [(dur * mult) | round(0) | int, 5] | max }}{%- endif %}


      # ============================================================
      #  Safety — Watchdog timeouts calculés (v1.0.7)
      #  Timeout = dose_duration × multiplicateur (global ou override)
      #  Override = 0 → utilise le multiplicateur global
      # ============================================================

      dmd_p1_soft_timeout:
        friendly_name: "Pump 1 : Soft watchdog timeout"
        unit_of_measurement: "s"
        icon_template: mdi:shield-half-full
        value_template: >-
          {%- set ov = states('input_number.dmd_p1_safety_soft_mult') | float(0) %}
          {%- set gl = states('input_number.dmd_safety_soft_mult') | float(2) %}
          {%- set mult = ov if ov > 0 else gl %}
          {%- set dur = states('sensor.dmd_p1_dose_duration') | float(0) %}
          {%- if dur <= 0 %}20
          {%- else %}{{ [(dur * mult) | round(0) | int, 5] | max }}{%- endif %}

      dmd_p2_soft_timeout:
        friendly_name: "Pump 2 : Soft watchdog timeout"
        unit_of_measurement: "s"
        icon_template: mdi:shield-half-full
        value_template: >-
          {%- set ov = states('input_number.dmd_p2_safety_soft_mult') | float(0) %}
          {%- set gl = states('input_number.dmd_safety_soft_mult') | float(2) %}
          {%- set mult = ov if ov > 0 else gl %}
          {%- set dur = states('sensor.dmd_p2_dose_duration') | float(0) %}
          {%- if dur <= 0 %}20
          {%- else %}{{ [(dur * mult) | round(0) | int, 5] | max }}{%- endif %}

      dmd_p3_soft_timeout:
        friendly_name: "Pump 3 : Soft watchdog timeout"
        unit_of_measurement: "s"
        icon_template: mdi:shield-half-full
        value_template: >-
          {%- set ov = states('input_number.dmd_p3_safety_soft_mult') | float(0) %}
          {%- set gl = states('input_number.dmd_safety_soft_mult') | float(2) %}
          {%- set mult = ov if ov > 0 else gl %}
          {%- set dur = states('sensor.dmd_p3_dose_duration') | float(0) %}
          {%- if dur <= 0 %}20
          {%- else %}{{ [(dur * mult) | round(0) | int, 5] | max }}{%- endif %}

      dmd_p4_soft_timeout:
        friendly_name: "Pump 4 : Soft watchdog timeout"
        unit_of_measurement: "s"
        icon_template: mdi:shield-half-full
        value_template: >-
          {%- set ov = states('input_number.dmd_p4_safety_soft_mult') | float(0) %}
          {%- set gl = states('input_number.dmd_safety_soft_mult') | float(2) %}
          {%- set mult = ov if ov > 0 else gl %}
          {%- set dur = states('sensor.dmd_p4_dose_duration') | float(0) %}
          {%- if dur <= 0 %}20
          {%- else %}{{ [(dur * mult) | round(0) | int, 5] | max }}{%- endif %}

      dmd_p1_hard_timeout:
        friendly_name: "Pump 1 : Hard watchdog timeout"
        unit_of_measurement: "s"
        icon_template: mdi:shield-alert
        value_template: >-
          {%- set ov = states('input_number.dmd_p1_safety_hard_mult') | float(0) %}
          {%- set gl = states('input_number.dmd_safety_hard_mult') | float(4) %}
          {%- set mult = ov if ov > 0 else gl %}
          {%- set dur = states('sensor.dmd_p1_dose_duration') | float(0) %}
          {%- if dur <= 0 %}40
          {%- else %}{{ [(dur * mult) | round(0) | int, 5] | max }}{%- endif %}

      dmd_p2_hard_timeout:
        friendly_name: "Pump 2 : Hard watchdog timeout"
        unit_of_measurement: "s"
        icon_template: mdi:shield-alert
        value_template: >-
          {%- set ov = states('input_number.dmd_p2_safety_hard_mult') | float(0) %}
          {%- set gl = states('input_number.dmd_safety_hard_mult') | float(4) %}
          {%- set mult = ov if ov > 0 else gl %}
          {%- set dur = states('sensor.dmd_p2_dose_duration') | float(0) %}
          {%- if dur <= 0 %}40
          {%- else %}{{ [(dur * mult) | round(0) | int, 5] | max }}{%- endif %}

      dmd_p3_hard_timeout:
        friendly_name: "Pump 3 : Hard watchdog timeout"
        unit_of_measurement: "s"
        icon_template: mdi:shield-alert
        value_template: >-
          {%- set ov = states('input_number.dmd_p3_safety_hard_mult') | float(0) %}
          {%- set gl = states('input_number.dmd_safety_hard_mult') | float(4) %}
          {%- set mult = ov if ov > 0 else gl %}
          {%- set dur = states('sensor.dmd_p3_dose_duration') | float(0) %}
          {%- if dur <= 0 %}40
          {%- else %}{{ [(dur * mult) | round(0) | int, 5] | max }}{%- endif %}

      dmd_p4_hard_timeout:
        friendly_name: "Pump 4 : Hard watchdog timeout"
        unit_of_measurement: "s"
        icon_template: mdi:shield-alert
        value_template: >-
          {%- set ov = states('input_number.dmd_p4_safety_hard_mult') | float(0) %}
          {%- set gl = states('input_number.dmd_safety_hard_mult') | float(4) %}
          {%- set mult = ov if ov > 0 else gl %}
          {%- set dur = states('sensor.dmd_p4_dose_duration') | float(0) %}
          {%- if dur <= 0 %}40
          {%- else %}{{ [(dur * mult) | round(0) | int, 5] | max }}{%- endif %}

      dmd_p1_lock_timeout:
        friendly_name: "Pump 1 : Lock watchdog timeout"
        unit_of_measurement: "s"
        icon_template: mdi:lock-clock
        value_template: >-
          {%- set ov = states('input_number.dmd_p1_safety_lock_mult') | float(0) %}
          {%- set gl = states('input_number.dmd_safety_lock_mult') | float(8) %}
          {%- set mult = ov if ov > 0 else gl %}
          {%- set dur = states('sensor.dmd_p1_dose_duration') | float(0) %}
          {%- if dur <= 0 %}80
          {%- else %}{{ [(dur * mult) | round(0) | int, 10] | max }}{%- endif %}

      dmd_p2_lock_timeout:
        friendly_name: "Pump 2 : Lock watchdog timeout"
        unit_of_measurement: "s"
        icon_template: mdi:lock-clock
        value_template: >-
          {%- set ov = states('input_number.dmd_p2_safety_lock_mult') | float(0) %}
          {%- set gl = states('input_number.dmd_safety_lock_mult') | float(8) %}
          {%- set mult = ov if ov > 0 else gl %}
          {%- set dur = states('sensor.dmd_p2_dose_duration') | float(0) %}
          {%- if dur <= 0 %}80
          {%- else %}{{ [(dur * mult) | round(0) | int, 10] | max }}{%- endif %}

      dmd_p3_lock_timeout:
        friendly_name: "Pump 3 : Lock watchdog timeout"
        unit_of_measurement: "s"
        icon_template: mdi:lock-clock
        value_template: >-
          {%- set ov = states('input_number.dmd_p3_safety_lock_mult') | float(0) %}
          {%- set gl = states('input_number.dmd_safety_lock_mult') | float(8) %}
          {%- set mult = ov if ov > 0 else gl %}
          {%- set dur = states('sensor.dmd_p3_dose_duration') | float(0) %}
          {%- if dur <= 0 %}80
          {%- else %}{{ [(dur * mult) | round(0) | int, 10] | max }}{%- endif %}

      dmd_p4_lock_timeout:
        friendly_name: "Pump 4 : Lock watchdog timeout"
        unit_of_measurement: "s"
        icon_template: mdi:lock-clock
        value_template: >-
          {%- set ov = states('input_number.dmd_p4_safety_lock_mult') | float(0) %}
          {%- set gl = states('input_number.dmd_safety_lock_mult') | float(8) %}
          {%- set mult = ov if ov > 0 else gl %}
          {%- set dur = states('sensor.dmd_p4_dose_duration') | float(0) %}
          {%- if dur <= 0 %}80
          {%- else %}{{ [(dur * mult) | round(0) | int, 10] | max }}{%- endif %}

      dmd_safety_config_ok:
        friendly_name: "Safety : Watchdog hierarchy valid"
        icon_template: >-
          {% if states('sensor.dmd_safety_config_ok') == 'OK' %}mdi:shield-check{% else %}mdi:shield-off{% endif %}
        value_template: >-
          {%- set soft = states('input_number.dmd_safety_soft_mult') | float(2) %}
          {%- set hard = states('input_number.dmd_safety_hard_mult') | float(4) %}
          {%- set esp32 = states('input_number.dmd_safety_esp32_mult') | float(6) %}
          {%- set lock = states('input_number.dmd_safety_lock_mult') | float(8) %}
          {%- if soft < hard and hard < esp32 and esp32 < lock %}OK
          {%- elif soft >= hard %}Soft >= Hard !
          {%- elif hard >= esp32 %}Hard >= ESP32 !
          {%- else %}ESP32 >= Lock !{%- endif %}

      # --- Dosing window sensors (v0.9.1) ---
      # interval_min : calculated interval between doses based on window
      # next_dose    : time remaining until next scheduled dose
      # window_ok    : warning if window is too small for requested frequency

      dmd_p1_interval_min:
        friendly_name: "Pump 1 : Interval between doses (min)"
        icon_template: mdi:timer-outline
        unit_of_measurement: min
        value_template: >-
          {% set freq = states('input_number.dmd_p1_frequency') | float(1) %}
          {% set sh = state_attr('input_datetime.dmd_p1_start_time', 'hour') | int(0) %}
          {% set sm = state_attr('input_datetime.dmd_p1_start_time', 'minute') | int(0) %}
          {% set eh = state_attr('input_datetime.dmd_p1_end_time', 'hour') | int(23) %}
