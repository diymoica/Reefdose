          {{ [(r / i * 100) | round(1), 0] | max }}

      dmd_p4_days_remaining:
        friendly_name: "Pump 4 : Days remaining"
        unit_of_measurement: "j"
        icon_template: mdi:calendar-clock
        value_template: >-
          {% set r = states('input_number.dmd_p4_tank_remaining') | float(0) %}
          {% set d = states('input_number.dmd_p4_daily_dose') | float(1) %}
          {{ (r / d) | round(1) }}


      # --- Dosing window sensors (v0.9.1) ---
      # interval_min : calculated interval between doses based on window
      # next_dose    : time remaining until next scheduled dose
      # window_ok    : warning if window is too small for requested frequency

      dmd_p1_interval_min:
        friendly_name: "Pump 1 : Interval between doses (min)"
        icon_template: mdi:timer-outline
        unit_of_measurement: min
        value_template: >-
          {% set freq = states('input_number.dmd_p1_frequency') | float(1) %}
          {% set sh = state_attr('input_datetime.dmd_p1_start_time', 'hour') | int(0) %}
          {% set sm = state_attr('input_datetime.dmd_p1_start_time', 'minute') | int(0) %}
          {% set eh = state_attr('input_datetime.dmd_p1_end_time', 'hour') | int(23) %}
          {% set em = state_attr('input_datetime.dmd_p1_end_time', 'minute') | int(59) %}
          {% set end_total_raw = eh * 60 + em %}
          {% set end_total = 1440 if end_total_raw == 0 else end_total_raw %}
          {% set start_total = sh * 60 + sm %}
          {% set window = 1440 if is_state('input_boolean.dmd_p1_full_day', 'on') else (end_total - start_total) %}
          {{ (window / freq) | int }}

      dmd_p1_window_ok:
        friendly_name: "Pump 1 : Window valid"
        icon_template: >-
          {% if states('sensor.dmd_p1_window_ok') == 'OK' %}mdi:check-circle
          {% else %}mdi:alert-circle{% endif %}
        value_template: >-
          {% set freq = states('input_number.dmd_p1_frequency') | float(1) %}
          {% set min_delay = states('input_number.dmd_dose_delay') | float(5) %}
          {% set sh = state_attr('input_datetime.dmd_p1_start_time', 'hour') | int(0) %}
          {% set sm = state_attr('input_datetime.dmd_p1_start_time', 'minute') | int(0) %}
          {% set eh = state_attr('input_datetime.dmd_p1_end_time', 'hour') | int(23) %}
          {% set em = state_attr('input_datetime.dmd_p1_end_time', 'minute') | int(59) %}
          {% set end_total_raw = eh * 60 + em %}
          {% set end_total = 1440 if end_total_raw == 0 else end_total_raw %}
          {% set start_total = sh * 60 + sm %}
          {% set window = 1440 if is_state('input_boolean.dmd_p1_full_day', 'on') else (end_total - start_total) %}
          {% if window <= 0 %}End before start
          {% elif (window / freq) < min_delay %}Too many doses for window
          {% else %}OK{% endif %}

      dmd_p1_next_dose:
        friendly_name: "Pump 1 : Next dose"
        icon_template: mdi:clock-outline
        value_template: >-
          {% if states('sensor.dmd_p1_window_ok') != 'OK' %}
            {{ states('sensor.dmd_p1_window_ok') }}
          {% else %}
            {% set freq = states('input_number.dmd_p1_frequency') | float(1) %}
            {% set sh = state_attr('input_datetime.dmd_p1_start_time', 'hour') | int(0) %}
            {% set sm = state_attr('input_datetime.dmd_p1_start_time', 'minute') | int(0) %}
            {% set eh = state_attr('input_datetime.dmd_p1_end_time', 'hour') | int(23) %}
            {% set em = state_attr('input_datetime.dmd_p1_end_time', 'minute') | int(59) %}
            {% set end_raw = eh * 60 + em %}
            {% set end_m = 1440 if end_raw == 0 else end_raw %}
            {% set interval = (1440 / freq) | int if is_state('input_boolean.dmd_p1_full_day', 'on') else ((end_m - sh * 60 - sm) / freq) | int %}
            {% set now_min = now().hour * 60 + now().minute %}
            {% if is_state('input_boolean.dmd_p1_full_day', 'on') %}
              {% set next_slot = ((now_min // interval) + 1) * interval %}
              {% if next_slot >= 1440 %}
                Tomorrow 00:00
              {% else %}
                {% set remaining = next_slot - now_min %}
                {% set h = (remaining // 60) | int %}
                {% set m = (remaining % 60) | int %}
                {% if h > 0 %}in {{ h }}h {{ m }}min{% else %}in {{ m }} min{% endif %}
              {% endif %}
            {% else %}
              {% set start_min = sh * 60 + sm %}
              {% set end_min = eh * 60 + em %}
              {% if now_min < start_min %}
                {% set remaining = start_min - now_min %}
                {% set h = (remaining // 60) | int %}
                {% set m = (remaining % 60) | int %}
                in {{ h }}h {{ m }}min (start)
              {% elif now_min > end_min %}
                Tomorrow {{ '%02d:%02d' | format(sh, sm) }}
              {% else %}
                {% set diff = now_min - start_min %}
                {% set remaining = interval - (diff % interval) %}
                {% if remaining == interval %}Now
                {% else %}
                  {% set h = (remaining // 60) | int %}
                  {% set m = (remaining % 60) | int %}
                  {% if h > 0 %}in {{ h }}h {{ m }}min{% else %}in {{ m }} min{% endif %}
                {% endif %}
              {% endif %}
            {% endif %}
          {% endif %}

      dmd_p2_interval_min:
        friendly_name: "Pump 2 : Interval between doses (min)"
