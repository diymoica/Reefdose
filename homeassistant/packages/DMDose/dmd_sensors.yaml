##################################################################################################################################
#                                                                                                                                #
#   ESP32 (name: dmd) :                                                                                                    #
#     switch.dmd_pompe_1  (Kh)      switch.dmd_pompe_2  (Ca)                                                         #
#     switch.dmd_pompe_3  (Mg)      switch.dmd_pompe_4  (Phyto)                                                      #
#     binary_sensor.dmd_status                                                                                             #
#   Notifications : notify.dmd_admin  (defined in packages/common/notify.yaml)                                           #
##################################################################################################################################

# dmd_sensors.yaml — Calculation sensors (flow rate, doses, levels, status)

sensor:
  - platform: template
    sensors:

      dmd_status:
        friendly_name: "DIY my Dose : Status"
        value_template: >-
          {% if is_state('binary_sensor.dmd_status', 'on') %}Online{% else %}Offline{% endif %}
        icon_template: >-
          {% if is_state('binary_sensor.dmd_status', 'on') %}mdi:power-plug{% else %}mdi:power-plug-off{% endif %}

      # --- Kh ---
      dmd_p1_flow_rate:
        friendly_name: "Pump 1 : Flow rate"
        unit_of_measurement: "ml/s"
        icon_template: mdi:speedometer
        value_template: >-
          {% set vol = states('input_number.dmd_p1_calib_volume') | float(0) %}
          {% set dur = states('input_number.dmd_p1_calib_duration') | float(1) %}
          {{ (vol / dur) | round(3) }}

      dmd_p1_dose_volume:
        friendly_name: "Pump 1 : Volume per dose"
        unit_of_measurement: "ml"
        icon_template: mdi:beaker
        value_template: >-
          {% set dose = states('input_number.dmd_p1_daily_dose') | float(0) %}
          {% set freq = states('input_number.dmd_p1_frequency') | float(1) %}
          {{ (dose / freq) | round(2) }}

      dmd_p1_dose_duration:
        friendly_name: "Pump 1 : Duration per dose"
        unit_of_measurement: "s"
        icon_template: mdi:timer
        value_template: >-
          {% set dose = states('input_number.dmd_p1_daily_dose') | float(0) %}
          {% set freq = states('input_number.dmd_p1_frequency') | float(1) %}
          {% set debit = states('sensor.dmd_p1_flow_rate') | float(0.001) %}
          {{ ((dose / freq) / debit) | round(1) }}


      dmd_p1_max_duration:
        friendly_name: "Pump 1 : Max safe duration"
        unit_of_measurement: "s"
        icon_template: mdi:shield-lock
        value_template: >-
          {% set max_vol = states('input_number.dmd_p1_max_volume') | float(0) %}
          {% set flow = states('sensor.dmd_p1_flow_rate') | float(0) %}
          {% if max_vol <= 0 or flow <= 0 %}30
          {% else %}{{ [((max_vol / flow) | round(0) | int), 5] | max }}{% endif %}

      dmd_p1_tank_pct:
        friendly_name_template: "{{ states('input_text.dmd_p1_name') }}"
        unit_of_measurement: "%"
        icon_template: mdi:percent
        value_template: >-
          {% set r = states('input_number.dmd_p1_tank_remaining') | float(0) %}
          {% set i = states('input_number.dmd_p1_tank_volume') | float(1) %}
          {{ [(r / i * 100) | round(1), 0] | max }}

      dmd_p1_days_remaining:
        friendly_name: "Pump 1 : Days remaining"
        unit_of_measurement: "j"
        icon_template: mdi:calendar-clock
        value_template: >-
          {% set r = states('input_number.dmd_p1_tank_remaining') | float(0) %}
          {% set d = states('input_number.dmd_p1_daily_dose') | float(1) %}
          {{ (r / d) | round(1) }}

      dmd_p2_flow_rate:
        friendly_name: "Pump 2 : Flow rate"
        unit_of_measurement: "ml/s"
        icon_template: mdi:speedometer
        value_template: >-
          {% set vol = states('input_number.dmd_p2_calib_volume') | float(0) %}
          {% set dur = states('input_number.dmd_p2_calib_duration') | float(1) %}
          {{ (vol / dur) | round(3) }}

      dmd_p2_dose_volume:
        friendly_name: "Pump 2 : Volume per dose"
        unit_of_measurement: "ml"
        icon_template: mdi:beaker
        value_template: >-
          {% set dose = states('input_number.dmd_p2_daily_dose') | float(0) %}
          {% set freq = states('input_number.dmd_p2_frequency') | float(1) %}
          {{ (dose / freq) | round(2) }}

      dmd_p2_dose_duration:
