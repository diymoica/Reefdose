            {% set end_raw = eh * 60 + em %}
            {% set end_m = 1440 if end_raw == 0 else end_raw %}
            {% set interval = (1440 / freq) | int if is_state('input_boolean.dmd_p3_full_day', 'on') else ((end_m - sh * 60 - sm) / freq) | int %}
            {% set now_min = now().hour * 60 + now().minute %}
            {% if is_state('input_boolean.dmd_p3_full_day', 'on') %}
              {% set next_slot = ((now_min // interval) + 1) * interval %}
              {% if next_slot >= 1440 %}
