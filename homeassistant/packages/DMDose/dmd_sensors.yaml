          {% else %}OK{% endif %}

      dmd_p3_next_dose:
        friendly_name: "Pump 3 : Next dose"
        icon_template: mdi:clock-outline
        value_template: >-
          {% if states('sensor.dmd_p3_window_ok') != 'OK' %}
            {{ states('sensor.dmd_p3_window_ok') }}
          {% else %}
            {% set freq = states('input_number.dmd_p3_frequency') | float(1) %}
            {% set sh = state_attr('input_datetime.dmd_p3_start_time', 'hour') | int(0) %}
            {% set sm = state_attr('input_datetime.dmd_p3_start_time', 'minute') | int(0) %}
            {% set eh = state_attr('input_datetime.dmd_p3_end_time', 'hour') | int(23) %}
