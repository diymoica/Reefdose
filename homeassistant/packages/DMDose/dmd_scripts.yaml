      - service: script.dmd_execute_dose
        data:
          switch_id: switch.dmd_pompe_4
          duree_s: "{{ states('sensor.dmd_p4_dose_duration') | int }}"
          volume_ml: "{{ states('sensor.dmd_p4_dose_volume') | float }}"
          bidon_entity: input_number.dmd_p4_tank_remaining
          counter_entity: counter.dmd_p4_daily_count
          volume_total_entity: input_number.dmd_p4_total_volume
          doses_total_entity: input_number.dmd_p4_total_doses
          datetime_entity: input_datetime.dmd_p4_last_dose

  dmd_calibration_p1:
    alias: "Pump 1 : Calibration"
    sequence:
      - service: switch.turn_on
        target:
          entity_id: switch.dmd_pompe_1
      - delay:
          seconds: "{{ states('input_number.dmd_p1_calib_duration') | int }}"
      - service: switch.turn_off
        target:
          entity_id: switch.dmd_pompe_1
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.dmd_p1_calib_start
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.dmd_p1_calib_mode
      - service: notify.dmd_admin
        data:
          title: >-
            ✅ {{ states('input_text.dmd_p1_name') }} calibration complete
          message: "Note the collected volume and enter it in Calibration volume."

  dmd_calibration_p2:
    alias: "Pump 2 : Calibration"
    sequence:
      - service: switch.turn_on
        target:
          entity_id: switch.dmd_pompe_2
      - delay:
          seconds: "{{ states('input_number.dmd_p2_calib_duration') | int }}"
      - service: switch.turn_off
        target:
          entity_id: switch.dmd_pompe_2
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.dmd_p2_calib_start
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.dmd_p2_calib_mode
      - service: notify.dmd_admin
        data:
          title: >-
