      - delay:
          seconds: "{{ states('input_number.dmd_p3_calib_duration') | int }}"
      - service: switch.turn_off
        target:
          entity_id: switch.dmd_pompe_3
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.dmd_p3_calib_start
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.dmd_p3_calib_mode
      - service: notify.dmd_admin
        data:
          title: >-
