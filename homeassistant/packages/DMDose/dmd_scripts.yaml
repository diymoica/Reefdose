  dmd_test_notification:
    alias: "DIY my Dose : Test notification"
    sequence:
      - service: notify.dmd_admin
        data:
          title: "✅ DIY my Dose — Notifications OK"
          message: >-
            Notifications are working correctly.
            Device: {{ states('sensor.dmd_status') }} —
            {{ now().strftime('%d/%m/%Y %H:%M') }}
