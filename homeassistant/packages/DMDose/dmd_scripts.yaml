      - service: switch.turn_off
        target:
          entity_id: switch.dmd_pompe_4
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.dmd_p4_calib_start
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.dmd_p4_calib_mode
      - service: notify.dmd_admin
        data:
          title: >-
            ✅ {{ states('input_text.dmd_p4_name') }} calibration complete
          message: "Note the collected volume and enter it in Calibration volume."


  dmd_tank_full_p1:
    alias: "Pump 1 : Tank refilled"
    sequence:
      - service: input_number.set_value
        target:
          entity_id: input_number.dmd_p1_tank_remaining
        data:
          value: "{{ states('input_number.dmd_p1_tank_volume') | float(0) }}"

  dmd_tank_full_p2:
    alias: "Pump 2 : Tank refilled"
    sequence:
      - service: input_number.set_value
        target:
          entity_id: input_number.dmd_p2_tank_remaining
        data:
          value: "{{ states('input_number.dmd_p2_tank_volume') | float(0) }}"

  dmd_tank_full_p3:
