  # --- Watchdog HARD — Pump 1 ---
  # Last resort: fires at hard_mult× expected duration.
  # Behaviour depends on dmd_p1_critical:
  #   ON  (critical pump) → stops ALL pumps + global pause + urgent notification
  #   OFF (non-critical)  → stops THIS pump only + urgent notification
  # Default: critical = ON (safe by default)
  - alias: "DIY my Dose : Watchdog hard — Pump 1"
    id: dmd_watchdog_hard_p1
    mode: restart
    trigger:
      - platform: state
        entity_id: switch.dmd_pompe_1
        to: "on"
    action:
      - wait_template: "{{ is_state('switch.dmd_pompe_1', 'off') }}"
        timeout:
          seconds: "{{ states('sensor.dmd_p1_hard_timeout') | int(40) }}"
        continue_on_timeout: true
      - condition: template
        value_template: "{{ not wait.completed }}"
      - choose:
          - conditions:
              - condition: state
                entity_id: input_boolean.dmd_p1_critical
                state: "on"
            sequence:
              - action: switch.turn_off
                target:
                  entity_id:
                    - switch.dmd_pompe_1
                    - switch.dmd_pompe_2
                    - switch.dmd_pompe_3
                    - switch.dmd_pompe_4
              - action: input_boolean.turn_on
                target:
                  entity_id: input_boolean.dmd_pause
              - action: input_boolean.turn_on
                target:
                  entity_id: input_boolean.dmd_safety_locked
              - action: notify.dmd_admin
                data:
                  title: "🚨 DmD TEST — Emergency stop ALL pumps"
                  message: >-
                    Hard watchdog on {{ states('input_text.dmd_p1_name') }} (critical).
                    ALL pumps stopped. Dosing paused. Immediate check required.
        default:
          - action: switch.turn_off
            target:
              entity_id: switch.dmd_pompe_1
          - action: notify.dmd_admin
            data:
              title: "🚨 DmD TEST — {{ states('input_text.dmd_p1_name') }} hard watchdog"
              message: >-
                Hard watchdog on {{ states('input_text.dmd_p1_name') }} (non-critical).
                Pump stopped. Other pumps continue. Check pump and settings.

