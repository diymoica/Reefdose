  # --- Push ESP32 hardware timeout ---
  # Triggered when calibration, dose config, or safety multiplier changes,
  # at HA start, and 5s after ESP32 reconnects (to ensure API is ready).
  # Pushes sensor.dmd_pX_esp32_timeout → number.dmd_pX_max_duration (ESPHome entity).
  - alias: "DIY my Dose : Push max duration to ESP32"
    id: dmd_push_max_duration
    trigger:
      - platform: state
        entity_id:
          - sensor.dmd_p1_esp32_timeout
          - sensor.dmd_p2_esp32_timeout
          - sensor.dmd_p3_esp32_timeout
          - sensor.dmd_p4_esp32_timeout
          - input_number.dmd_safety_esp32_mult
      - platform: homeassistant
        event: start
      - platform: state
        entity_id: binary_sensor.dmd_status
        to: "on"
    action:
      # Small delay on reconnect — give the API time to initialize
      - delay:
          seconds: 5
      - action: number.set_value
        target:
          entity_id: number.dmd_p1_max_duration
        data:
          value: "{{ [states('sensor.dmd_p1_esp32_timeout') | int(30), 5] | max }}"
      - action: number.set_value
        target:
          entity_id: number.dmd_p2_max_duration
        data:
          value: "{{ [states('sensor.dmd_p2_esp32_timeout') | int(30), 5] | max }}"
      - action: number.set_value
        target:
          entity_id: number.dmd_p3_max_duration
        data:
          value: "{{ [states('sensor.dmd_p3_esp32_timeout') | int(30), 5] | max }}"
      - action: number.set_value
        target:
          entity_id: number.dmd_p4_max_duration
        data:
          value: "{{ [states('sensor.dmd_p4_esp32_timeout') | int(30), 5] | max }}"

  # --- Drift detection — alert after refill (v1.0.5) ---
  # Se déclenche quand le volume consommé est calculé (après remplissage avec données)
  - alias: "DIY my Dose : Drift alert after refill"
    id: dmd_drift_alert_refill
    trigger:
      - platform: state
        entity_id:
          - input_number.dmd_p1_volume_consumed_last_period
          - input_number.dmd_p2_volume_consumed_last_period
          - input_number.dmd_p3_volume_consumed_last_period
          - input_number.dmd_p4_volume_consumed_last_period
    condition:
      - condition: template
        value_template: >-
          {% set pumps = [
            ('p1', 'sensor.dmd_p1_health_status', 'input_text.dmd_p1_name', 'sensor.dmd_p1_drift_pct'),
            ('p2', 'sensor.dmd_p2_health_status', 'input_text.dmd_p2_name', 'sensor.dmd_p2_drift_pct'),
            ('p3', 'sensor.dmd_p3_health_status', 'input_text.dmd_p3_name', 'sensor.dmd_p3_drift_pct'),
            ('p4', 'sensor.dmd_p4_health_status', 'input_text.dmd_p4_name', 'sensor.dmd_p4_drift_pct'),
          ] %}
          {{ pumps | selectattr(0, 'in', trigger.entity_id) | list | length > 0
             and states(trigger.entity_id | replace('volume_consumed_last_period', 'health_status')) != 'OK'
             and states(trigger.entity_id | replace('volume_consumed_last_period', 'health_status')) != 'Pas de données' }}
    action:
      - action: notify.dmd_admin
        data:
          title: >-
            {% set e = trigger.entity_id | replace('input_number.dmd_','') | replace('_volume_consumed_last_period','') %}
            {% set health = states('sensor.dmd_' + e + '_health_status') %}
            {% if health == 'Recalibrer' %}🚨{% else %}⚠️{% endif %} DmD TEST — {{ states('input_text.dmd_' + e + '_name') }} dérive détectée
          message: >-
            {% set e = trigger.entity_id | replace('input_number.dmd_','') | replace('_volume_consumed_last_period','') %}
            Dose configurée : {{ states('input_number.dmd_' + e + '_daily_dose') }} ml/j
            Dose réelle estimée : {{ states('sensor.dmd_' + e + '_real_daily_dose') }} ml/j
            Dérive : {{ states('sensor.dmd_' + e + '_drift_pct') }}%
            Statut : {{ states('sensor.dmd_' + e + '_health_status') }}

  # Fix v1.0.6 — Alerte volume insuffisant
  - alias: "DIY my Dose : Alert tank empty dose blocked"
    id: dmd_alert_tank_empty_blocked
    trigger:
      - platform: template
        value_template: >-
          {{ states('input_number.dmd_p1_tank_remaining') | float(0) < states('sensor.dmd_p1_dose_volume') | float(0)
             and is_state('input_boolean.dmd_p1_auto', 'on') }}
        id: p1
      - platform: template
        value_template: >-
          {{ states('input_number.dmd_p2_tank_remaining') | float(0) < states('sensor.dmd_p2_dose_volume') | float(0)
             and is_state('input_boolean.dmd_p2_auto', 'on') }}
        id: p2
      - platform: template
        value_template: >-
          {{ states('input_number.dmd_p3_tank_remaining') | float(0) < states('sensor.dmd_p3_dose_volume') | float(0)
             and is_state('input_boolean.dmd_p3_auto', 'on') }}
        id: p3
      - platform: template
        value_template: >-
          {{ states('input_number.dmd_p4_tank_remaining') | float(0) < states('sensor.dmd_p4_dose_volume') | float(0)
             and is_state('input_boolean.dmd_p4_auto', 'on') }}
        id: p4
    condition:
      - condition: state
        entity_id: input_boolean.dmd_sim_mode
        state: "off"
    action:
      - variables:
          pump_name: >-
            {% if trigger.id == 'p1' %}{{ states('input_text.dmd_p1_name') }}
            {% elif trigger.id == 'p2' %}{{ states('input_text.dmd_p2_name') }}
            {% elif trigger.id == 'p3' %}{{ states('input_text.dmd_p3_name') }}
            {% else %}{{ states('input_text.dmd_p4_name') }}{% endif %}
          remaining: >-
            {% if trigger.id == 'p1' %}{{ states('input_number.dmd_p1_tank_remaining') | round(1) }}
            {% elif trigger.id == 'p2' %}{{ states('input_number.dmd_p2_tank_remaining') | round(1) }}
            {% elif trigger.id == 'p3' %}{{ states('input_number.dmd_p3_tank_remaining') | round(1) }}
            {% else %}{{ states('input_number.dmd_p4_tank_remaining') | round(1) }}{% endif %}
      - action: notify.dmd_admin
        data:
          title: "🚫 DmD TEST — {{ pump_name }} dose bloquée"
          message: >-
            Volume restant ({{ remaining }} ml) insuffisant pour la prochaine dose.
            Remplissez le bidon et appuyez sur "Plein fait !".


  # ============================================================
  #  Déverrouillage sécurité (v1.0.7)
  #  Déclenché par le bouton dashboard "Déverrouiller"
  #  Réinitialise dmd_safety_locked et tous les verrous par pompe
  # ============================================================
  - alias: "DIY my Dose : Safety unlock"
    id: dmd_safety_unlock
    trigger:
      - platform: state
        entity_id: input_boolean.dmd_safety_locked
        to: "off"
    action:
      - action: input_boolean.turn_off
        target:
          entity_id:
            - input_boolean.dmd_p1_safety_locked
            - input_boolean.dmd_p2_safety_locked
            - input_boolean.dmd_p3_safety_locked
            - input_boolean.dmd_p4_safety_locked
      - action: notify.dmd_admin
        data:
          title: "✅ DmD TEST — Sécurité déverrouillée"
          message: >-
            Le verrou de sécurité a été désactivé manuellement.
            Le dosage automatique reprend normalement.

  # ============================================================
  #  Watchdog verrou dosage (v1.0.7)
  #  Si dmd_dosing reste ON plus longtemps que dmd_dosing_timeout
  #  → reset + coupe pompes + notification
  # ============================================================
  - alias: "DIY my Dose : Watchdog dose lock"
    id: dmd_watchdog_dose_lock
    mode: restart
    trigger:
      - platform: state
        entity_id: input_boolean.dmd_dosing
        to: "on"
    action:
      - wait_template: "{{ not is_state('input_boolean.dmd_dosing', 'on') }}"
        timeout:
          seconds: "{{ [states('sensor.dmd_p1_lock_timeout') | int(80), states('sensor.dmd_p2_lock_timeout') | int(80), states('sensor.dmd_p3_lock_timeout') | int(80), states('sensor.dmd_p4_lock_timeout') | int(80)] | max }}"
        continue_on_timeout: true
      - condition: template
        value_template: "{{ not wait.completed }}"
      # Verrou bloqué trop longtemps → reset forcé
      - action: switch.turn_off
        target:
          entity_id:
            - switch.dmd_pompe_1
            - switch.dmd_pompe_2
            - switch.dmd_pompe_3
            - switch.dmd_pompe_4
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.dmd_dosing
      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.dmd_safety_locked
      - action: notify.dmd_admin
        data:
          title: "🚨 DmD TEST — Verrou dosage bloqué, reset forcé"
          message: >-
            Le verrou dmd_dosing est resté actif plus de
            {{ [states('sensor.dmd_p1_lock_timeout') | int(80), states('sensor.dmd_p2_lock_timeout') | int(80), states('sensor.dmd_p3_lock_timeout') | int(80), states('sensor.dmd_p4_lock_timeout') | int(80)] | max }}s.
            Toutes les pompes ont été coupées.
            Vérifiez l'état de la doseuse.
