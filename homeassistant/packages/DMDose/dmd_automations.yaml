      - condition: template
        value_template: >-
          {{ now().minute == states('input_number.dmd_p1_offset_min') | int }}
    action:
      - action: number.set_value
        target:
          entity_id: input_number.dmd_p1_missed_doses
        data:
          value: "{{ (states('input_number.dmd_p1_missed_doses') | float(0) + 1) | round(0) }}"
      - action: notify.dmd_admin
        data:
          title: >-
            ❌ DmD TEST — {{ states('input_text.dmd_p1_name') }} dose missed
          message: >-
            {{ states('input_number.dmd_p1_tank_remaining') | round(0) }} ml remaining ({{ states('sensor.dmd_p1_days_remaining') }} days).

