# dmd_automations.yaml — Automations

automation:

  - alias: "DIY my Dose : Reset counters at midnight"
    id: dmd_reset_daily_counters
    trigger:
      - platform: time
        at: "00:00:00"
    action:
      # Fix v1.0.6 — attendre la fin d'une dose en cours avant de reset
      - wait_template: "{{ not is_state('input_boolean.dmd_dosing', 'on') }}"
        timeout:
          seconds: 120
        continue_on_timeout: true
      - action: counter.reset
        target:
          entity_id:
            - counter.dmd_p1_daily_count
            - counter.dmd_p2_daily_count
            - counter.dmd_p3_daily_count
            - counter.dmd_p4_daily_count

  # --- Offline alert + auto-pause (v1.0.0) ---
  # Replaces previous dmd_notify_offline (notification only)
  # Pauses all dosing automations when ESP32 is unreachable
  # User must manually re-enable dmd_pause when ESP32 is back
  - alias: "DIY my Dose : ESP32 offline — pause and notify"
    id: dmd_notify_offline
    trigger:
      - platform: state
        entity_id: binary_sensor.dmd_status
        to: "off"
        for:
          minutes: 2
    action:
      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.dmd_pause
      - action: notify.dmd_admin
        data:
          title: "🚨 DmD TEST — ESP32 offline"
          message: >-
            Dosing paused automatically. Check WiFi and ESP32.
            Re-enable dosing manually once the device is back online.

  - alias: "DIY my Dose : Pump 1 tank low alert"
    id: dmd_alert_tank_p1
    trigger:
      - platform: template
        value_template: >-
          {{ states('input_number.dmd_p1_tank_remaining') | float(0)
             <= states('input_number.dmd_p1_alert_threshold') | float(0) }}
    condition:
      - condition: template
        value_template: "{{ states('input_number.dmd_p1_tank_remaining') | float(0) > 0 }}"
    action:
      - action: notify.dmd_admin
        data:
          title: >-
            🪣 DmD TEST — {{ states('input_text.dmd_p1_name') }} reservoir low
          message: >-
            {{ states('input_number.dmd_p1_tank_remaining') | round(0) }} ml remaining ({{ states('sensor.dmd_p1_days_remaining') }} days).
