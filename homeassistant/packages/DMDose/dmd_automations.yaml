  - alias: "DIY my Dose : Auto-calculate offsets from compatibility matrix"
    id: dmd_auto_calculate_offsets
    trigger:
      - platform: state
        entity_id:
          - input_number.dmd_delay_p1_p2
          - input_number.dmd_delay_p1_p3
          - input_number.dmd_delay_p1_p4
          - input_number.dmd_delay_p2_p3
          - input_number.dmd_delay_p2_p4
          - input_number.dmd_delay_p3_p4
      - platform: homeassistant
        event: start
    action:
      # P1 toujours offset 0
      - action: number.set_value
        target:
          entity_id: input_number.dmd_p1_offset_min
        data:
          value: 0
      # P2 offset = délai P1→P2
      - action: number.set_value
        target:
          entity_id: input_number.dmd_p2_offset_min
        data:
          value: "{{ states('input_number.dmd_delay_p1_p2') | int(0) }}"
      # P3 offset = max des contraintes réelles (ignorées si délai = 0)
      - action: number.set_value
        target:
          entity_id: input_number.dmd_p3_offset_min
        data:
          value: >-
            {% set d13 = states('input_number.dmd_delay_p1_p3') | int(0) %}
            {% set d23 = states('input_number.dmd_delay_p2_p3') | int(0) %}
            {% set d12 = states('input_number.dmd_delay_p1_p2') | int(0) %}
            {% set from_p1 = d13 %}
            {% set from_p2 = (d23 + d12) if d23 > 0 else 0 %}
            {{ [from_p1, from_p2] | max }}
      # P4 offset = délai P1→P4
      - action: number.set_value
        target:
          entity_id: input_number.dmd_p4_offset_min
        data:
          value: "{{ states('input_number.dmd_delay_p1_p4') | int(0) }}"

  ##################################################################################################################################
  #                                                                                                                                #
  #   SAFETY — v1.0.0                                                                                                             #
  #                                                                                                                                #
  #   Watchdog soft  : pump runs > duration×2  → stop pump + warning notification                                                #
  #   Watchdog hard  : pump runs > duration×5  → stop ALL pumps + pause dosing + urgent notification                             #
  #   Push max_duration : updates ESP32 hardware timeout when config changes                                                      #
  #                                                                                                                                #
  ##################################################################################################################################

  # --- Watchdog SOFT — Pump 1 ---
  # Fires if pump stays ON more than 2× its expected dose duration.
  # mode: restart ensures the timer resets if the pump is triggered again.
  - alias: "DIY my Dose : Watchdog soft — Pump 1"
    id: dmd_watchdog_soft_p1
    mode: restart
    trigger:
      - platform: state
        entity_id: switch.dmd_pompe_1
        to: "on"
    action:
      - wait_template: "{{ is_state('switch.dmd_pompe_1', 'off') }}"
        timeout:
          seconds: "{{ states('sensor.dmd_p1_soft_timeout') | int(20) }}"
        continue_on_timeout: true
      - condition: template
        value_template: "{{ not wait.completed }}"
      - action: switch.turn_off
        target:
          entity_id: switch.dmd_pompe_1
      # v1.0.7 — verrou par pompe + notification
      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.dmd_p1_safety_locked
      - action: counter.increment
        target:
          entity_id: counter.dmd_p1_daily_count
      - action: notify.dmd_admin
        data:
          title: "⚠️ DmD TEST — {{ states('input_text.dmd_p1_name') }} watchdog soft"
          message: >-
            La pompe a tourné trop longtemps (limite soft : {{ states('sensor.dmd_p1_soft_timeout') }}s).
            Coupée automatiquement. 1 dose surdosée déduite du compteur.
            Vérifiez la pompe et les réglages de sécurité.

  # --- Watchdog SOFT — Pump 2 ---
