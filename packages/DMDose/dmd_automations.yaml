  - alias: "DIY my Dose : Auto dosing Pump 1"
    id: dmd_auto_dose_p1
    trigger:
      - platform: time_pattern
        minutes: /1
    condition:
      - condition: state
        entity_id: input_boolean.dmd_pause
        state: "off"
      - condition: state
        entity_id: input_boolean.dmd_p1_auto
        state: "on"
      - condition: state
        entity_id: sensor.dmd_status
        state: "Online"
      - condition: template
        value_template: >-
          {#- Si manual_resets_cycle est ON, vérifier que le délai depuis la dernière dose est >= interval #}
          {%- if is_state('input_boolean.dmd_p1_manual_resets_cycle', 'on') %}
            {%- set last = states('input_datetime.dmd_p1_last_dose') %}
            {%- if last in ['unknown', 'unavailable', 'None'] %}true
            {%- else %}
              {%- set sh = state_attr('input_datetime.dmd_p1_start_time', 'hour') | int(0) %}
              {%- set sm = state_attr('input_datetime.dmd_p1_start_time', 'minute') | int(0) %}
              {%- set eh = state_attr('input_datetime.dmd_p1_end_time', 'hour') | int(23) %}
              {%- set em = state_attr('input_datetime.dmd_p1_end_time', 'minute') | int(59) %}
              {%- set freq = states('input_number.dmd_p1_frequency') | float(1) %}
              {%- set end_raw = eh * 60 + em %}
              {%- set end_m = 1440 if end_raw == 0 else end_raw %}
              {%- set interval = ((end_m - sh * 60 - sm) / freq) | int %}
              {%- set mins_since = (now() - as_datetime(last).replace(tzinfo=now().tzinfo)).total_seconds() / 60 %}
              {{ mins_since >= interval }}
            {%- endif %}
          {%- else %}true
          {%- endif %}
      - condition: template
        value_template: "{{ states('sensor.dmd_p1_window_ok') == 'OK' }}"
      - condition: template
        value_template: >-
          {%- if is_state('input_boolean.dmd_sim_mode', 'on') %}
            {{ now().minute % (states('input_number.dmd_sim_interval') | int(2)) == 0 }}
          {%- else %}
            {% set freq = states('input_number.dmd_p1_frequency') | float(1) %}
            {% set now_min = now().hour * 60 + now().minute %}
            {% set offset = states('input_number.dmd_p1_offset_min') | int(0) %}
            {% if is_state('input_boolean.dmd_p1_full_day', 'on') %}
              {% set interval = (1440 / freq) | int %}
              {{ interval > 0 and (now_min - offset) % interval == 0 and now_min >= offset }}
            {% else %}
              {% set sh = state_attr('input_datetime.dmd_p1_start_time', 'hour') | int(0) %}
              {% set sm = state_attr('input_datetime.dmd_p1_start_time', 'minute') | int(0) %}
              {% set eh = state_attr('input_datetime.dmd_p1_end_time', 'hour') | int(23) %}
              {% set em = state_attr('input_datetime.dmd_p1_end_time', 'minute') | int(59) %}
              {% set start_min = sh * 60 + sm %}
              {% set end_min_raw = eh * 60 + em %}
              {% set end_min = 1440 if end_min_raw == 0 else end_min_raw %}
              {% set interval = ((end_min - start_min) / freq) | int %}
              {% set diff = now_min - start_min - offset %}
              {{ diff >= 0 and now_min <= end_min and diff % interval == 0 }}
            {% endif %}
          {%- endif %}
    action:
      - service: script.dmd_execute_dose
        data:
          switch_id: switch.dmd_pompe_1
          duree_s: "{{ states('sensor.dmd_p1_dose_duration') | int }}"
          volume_ml: "{{ states('sensor.dmd_p1_dose_volume') | float }}"
          bidon_entity: input_number.dmd_p1_tank_remaining
          counter_entity: counter.dmd_p1_daily_count
          volume_total_entity: input_number.dmd_p1_total_volume
          doses_total_entity: input_number.dmd_p1_total_doses
          datetime_entity: input_datetime.dmd_p1_last_dose

