# dmd_automations.yaml — Automations

automation:

  - alias: "DIY my Dose : Reset counters at midnight"
    id: dmd_reset_daily_counters
    trigger:
      - platform: time
        at: "00:00:00"
    action:
      - service: counter.reset
        target:
          entity_id:
            - counter.dmd_p1_daily_count
            - counter.dmd_p2_daily_count
            - counter.dmd_p3_daily_count
            - counter.dmd_p4_daily_count

  - alias: "DIY my Dose : Offline notification"
    id: dmd_notify_offline
    trigger:
      - platform: state
        entity_id: binary_sensor.dmd_status
        to: "off"
        for:
          minutes: 2
    action:
      - service: notify.dmd_admin
        data:
          title: "⚠️ DIY my Dose offline"
          message: "The doser is not responding. Check WiFi connection."

  - alias: "DIY my Dose : Pump 1 tank low alert"
    id: dmd_alert_tank_p1
    trigger:
      - platform: template
        value_template: >-
          {{ states('input_number.dmd_p1_tank_remaining') | float(0)
             <= states('input_number.dmd_p1_alert_threshold') | float(0) }}
    condition:
      - condition: template
        value_template: "{{ states('input_number.dmd_p1_tank_remaining') | float(0) > 0 }}"
    action:
      - service: notify.dmd_admin
        data:
          title: >-
            🪣 {{ states('input_text.dmd_p1_name') }} reservoir low
          message: >-
            {{ states('input_number.dmd_p1_tank_remaining') | round(0) }} ml remaining ({{ states('sensor.dmd_p1_days_remaining') }} days).
