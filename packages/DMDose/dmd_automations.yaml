        entity_id: input_boolean.dmd_p4_auto
        state: "on"
      - condition: state
        entity_id: sensor.dmd_status
        state: "Offline"
      - condition: template
        value_template: >-
          {% set freq = states('input_number.dmd_p4_frequency') | float(1) %}
          {{ now().hour % (24 / freq | int) == 0 }}
      - condition: template
        value_template: >-
          {{ now().minute == states('input_number.dmd_p4_offset_min') | int }}
    action:
      - service: input_number.set_value
        target:
          entity_id: input_number.dmd_p4_missed_doses
        data:
          value: "{{ (states('input_number.dmd_p4_missed_doses') | float(0) + 1) | round(0) }}"
      - service: notify.dmd_admin
        data:
          title: >-
            ❌ {{ states('input_text.dmd_p4_name') }} dose missed
          message: >-
            Automatic dose was not triggered. Check pump status and settings.

