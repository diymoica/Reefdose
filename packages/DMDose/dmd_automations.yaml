          {% set freq = states('input_number.dmd_p1_frequency') | float(1) %}
          {{ now().hour % (24 / freq | int) == 0 }}
      - condition: template
        value_template: >-
          {{ now().minute == states('input_number.dmd_p1_offset_min') | int }}
    action:
      - service: input_number.set_value
        target:
          entity_id: input_number.dmd_p1_missed_doses
        data:
          value: "{{ (states('input_number.dmd_p1_missed_doses') | float(0) + 1) | round(0) }}"
      - service: notify.dmd_admin
        data:
          title: >-
            ❌ {{ states('input_text.dmd_p1_name') }} dose missed
          message: >-
            {{ states('input_number.dmd_p4_tank_remaining') | round(0) }} ml remaining ({{ states('sensor.dmd_p4_days_remaining') }} days).

