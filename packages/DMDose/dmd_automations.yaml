        target:
          entity_id: input_boolean.dmd_dosing

  - alias: "DIY my Dose : Reset simulation options when sim mode off"
    id: dmd_sim_mode_off_reset
    trigger:
      - platform: state
        entity_id: input_boolean.dmd_sim_mode
        to: "off"
    action:
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.dmd_sim_real_pumps
      - service: input_number.set_value
        target:
          entity_id: input_number.dmd_sim_interval
        data:
          value: 3
      - delay:
          seconds: 2
      - service: automation.reload

  - alias: "DIY my Dose : Auto-calculate offsets from compatibility matrix"
    id: dmd_auto_calculate_offsets
    trigger:
      - platform: state
        entity_id:
          - input_number.dmd_delay_p1_p2
          - input_number.dmd_delay_p1_p3
          - input_number.dmd_delay_p1_p4
          - input_number.dmd_delay_p2_p3
          - input_number.dmd_delay_p2_p4
          - input_number.dmd_delay_p3_p4
      - platform: homeassistant
        event: start
    action:
      # P1 toujours offset 0
      - service: input_number.set_value
        target:
          entity_id: input_number.dmd_p1_offset_min
        data:
          value: 0
      # P2 offset = délai P1→P2
      - service: input_number.set_value
        target:
          entity_id: input_number.dmd_p2_offset_min
        data:
          value: "{{ states('input_number.dmd_delay_p1_p2') | int(0) }}"
      # P3 offset = max des contraintes réelles (ignorées si délai = 0)
      - service: input_number.set_value
        target:
          entity_id: input_number.dmd_p3_offset_min
        data:
          value: >-
            {% set d13 = states('input_number.dmd_delay_p1_p3') | int(0) %}
            {% set d23 = states('input_number.dmd_delay_p2_p3') | int(0) %}
            {% set d12 = states('input_number.dmd_delay_p1_p2') | int(0) %}
            {% set from_p1 = d13 %}
            {% set from_p2 = (d23 + d12) if d23 > 0 else 0 %}
            {{ [from_p1, from_p2] | max }}
      # P4 offset = délai P1→P4
      - service: input_number.set_value
        target:
          entity_id: input_number.dmd_p4_offset_min
        data:
          value: "{{ states('input_number.dmd_delay_p1_p4') | int(0) }}"
