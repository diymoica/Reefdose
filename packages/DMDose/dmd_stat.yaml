# dmd_stat.yaml — Statistics (counters, history, total volumes)

input_number:
  dmd_p1_total_volume:
    name: "Pump 1 : Total dosed volume"
    min: 0
    max: 9999999
    step: 0.1
    unit_of_measurement: ml
    icon: mdi:chart-line
    mode: box
  dmd_p1_total_doses:
    name: "Pump 1 : Total doses"
    min: 0
    max: 9999999
    step: 1
    unit_of_measurement: doses
