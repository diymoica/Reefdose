counter:
  dmd_p1_daily_count:
    name: "Pump 1 : Doses today"
    initial: 0
    step: 1
    icon: mdi:counter
    restore: true
  dmd_p2_daily_count:
    name: "Pump 2 : Doses today"
    initial: 0
    step: 1
    icon: mdi:counter
    restore: true
  dmd_p3_daily_count:
    name: "Pump 3 : Doses today"
    initial: 0
    step: 1
    icon: mdi:counter
    restore: true
  dmd_p4_daily_count:
    name: "Pump 4 : Doses today"
    initial: 0
    step: 1
    icon: mdi:counter
    restore: true


##################################################################################################################################
#                                               SENSORS                                                                         #
##################################################################################################################################


sensor:
  - platform: template
    sensors:

      dmd_p1_time_since_dose:
        friendly_name: "Pump 1 : Time since last dose"
        icon_template: mdi:clock-outline
        value_template: >-
          {% set dt = states('input_datetime.dmd_p1_last_dose') %}
          {% if dt in ['unknown', 'unavailable'] %}Never
          {% else %}
            {% set diff = (now() - as_datetime(dt).replace(tzinfo=now().tzinfo)).total_seconds() | int %}
            {% set h = (diff // 3600) | int %}
            {% set m = ((diff % 3600) // 60) | int %}
            {% if h > 0 %}{{ h }}h {{ m }}min{% else %}{{ m }} min{% endif %}
          {% endif %}

      dmd_p1_weekly_volume:
        friendly_name: "Pump 1 : Weekly volume (estimated)"
        unit_of_measurement: "ml"
        icon_template: mdi:chart-bar
        value_template: >-
          {{ (states('input_number.dmd_p1_daily_dose') | float(0) * 7) | round(1) }}

      dmd_p1_monthly_volume:
        friendly_name: "Pump 1 : Monthly volume (estimated)"
        unit_of_measurement: "ml"
        icon_template: mdi:chart-bar
        value_template: >-
          {{ (states('input_number.dmd_p1_daily_dose') | float(0) * now().day) | round(1) }}

      dmd_p1_yearly_volume:
        friendly_name: "Pump 1 : Yearly volume (estimated)"
        unit_of_measurement: "ml"
        icon_template: mdi:chart-line
        value_template: >-
          {% set debut = now().replace(month=1, day=1, hour=0, minute=0, second=0) %}
          {% set jours = (now() - debut).days + 1 %}
          {{ (states('input_number.dmd_p1_daily_dose') | float(0) * jours) | round(1) }}

