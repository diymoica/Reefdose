##################################################################################################################################
#                                                                                                                                #
#                                              DMDose - ESPHome                                                                  #
#                                                                                                                                #
#   Board    : ESP32 Dev                                                                                                         #
#   IP fixe  : 192.168.1.34                                                                                                     #
#                                                                                                                                #
#   GPIO :                                                                                                                       #
#     - GPIO27 → Pompe 1                                                                                                        #
#     - GPIO12 → Pompe 2                                                                                                        #
#     - GPIO13 → Pompe 3                                                                                                        #
#     - GPIO14 → Pompe 4                                                                                                        #
#                                                                                                                                #
##################################################################################################################################

esphome:
  name: dmd
  friendly_name: DIY my Dose

esp32:
  board: esp32dev
  framework:
    type: arduino



# ----------------------------------------------------------------
#  Variables globales — stockent les max_duration pour les watchdogs
#  Mis à jour via on_value sur les number entities
#  Évite les race conditions entre API HA et on_turn_on
# ----------------------------------------------------------------
globals:
  - id: g_p1_max
    type: float
    restore_value: false
    initial_value: 300
  - id: g_p2_max
    type: float
    restore_value: false
    initial_value: 300
  - id: g_p3_max
    type: float
    restore_value: false
    initial_value: 300
  - id: g_p4_max
    type: float
    restore_value: false
    initial_value: 300

# ----------------------------------------------------------------
#  Logging
# ----------------------------------------------------------------
logger:
  level: INFO

# ----------------------------------------------------------------
#  API Home Assistant
# ----------------------------------------------------------------
api:
  encryption:
    key: !secret esphome_api_key


# ----------------------------------------------------------------
#  OTA (mise à jour sans fil)
# ----------------------------------------------------------------
ota:
  - platform: esphome
    password: !secret esphome_ota_password

# ----------------------------------------------------------------
#  WiFi
# ----------------------------------------------------------------
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  manual_ip:
    static_ip: !secret dmd_ip
    gateway: !secret wifi_gateway
    subnet: 255.255.255.0

  ap:
    ssid: !secret wifi_ssid
    password: !secret ap_password

captive_portal:

# ----------------------------------------------------------------
#  Interface web locale (accès direct via http://192.168.1.34)
# ----------------------------------------------------------------
web_server:
  port: 80

# ----------------------------------------------------------------
#  Statut de connexion
# ----------------------------------------------------------------
binary_sensor:
  - platform: status
    name: "Status"

# ----------------------------------------------------------------
#  Switchs des pompes
#  restore_mode: ALWAYS_OFF → sécurité au redémarrage
#  max_duration → watchdog hardware : coupe la pompe si elle
#  reste ON plus longtemps que la durée configurée depuis HA
#  (sécurité si HA plante en pleine dose)
# ----------------------------------------------------------------
switch:
  - platform: gpio
    pin: GPIO27
    name: "Pompe_1"
    id: pompe_1
    icon: "mdi:pump"
    restore_mode: ALWAYS_OFF
    on_turn_on:
      - delay: 10ms
      - if:
          condition:
            lambda: 'return id(p1_max_duration).state > 0;'
          then:
            - delay: !lambda 'return id(p1_max_duration).state * 1000;'
            - switch.turn_off: pompe_1

  - platform: gpio
    pin: GPIO12
    name: "Pompe_2"
    id: pompe_2
    icon: "mdi:pump"
    restore_mode: ALWAYS_OFF
    on_turn_on:
      - delay: 10ms
      - if:
          condition:
            lambda: 'return id(p2_max_duration).state > 0;'
          then:
            - delay: !lambda 'return id(p2_max_duration).state * 1000;'
            - switch.turn_off: pompe_2

  - platform: gpio
    pin: GPIO13
    name: "Pompe_3"
    id: pompe_3
    icon: "mdi:pump"
    restore_mode: ALWAYS_OFF
    on_turn_on:
      - delay: 10ms
      - if:
          condition:
            lambda: 'return id(p3_max_duration).state > 0;'
          then:
            - delay: !lambda 'return id(p3_max_duration).state * 1000;'
            - switch.turn_off: pompe_3

  - platform: gpio
    pin: GPIO14
    name: "Pompe_4"
    id: pompe_4
    icon: "mdi:pump"
    restore_mode: ALWAYS_OFF
    on_turn_on:
      - delay: 10ms
      - if:
          condition:
            lambda: 'return id(p4_max_duration).state > 0;'
          then:
            - delay: !lambda 'return id(p4_max_duration).state * 1000;'
            - switch.turn_off: pompe_4

# ----------------------------------------------------------------
#  Watchdog hardware — durée max par pompe (secondes)
#  Configurable depuis HA via number.dmd_pX_max_duration
#  Poussé depuis HA par l'automation dmd_push_max_duration
#  Valeur 0 = watchdog désactivé
# ----------------------------------------------------------------
number:
  - platform: template
    name: "p1_max_duration"
    id: p1_max_duration
    min_value: 0
    max_value: 300
    step: 1
    unit_of_measurement: s
    optimistic: true
    restore_value: true
    initial_value: 300
    on_value:
      - globals.set:
          id: g_p1_max
          value: !lambda 'return x;'

  - platform: template
    name: "p2_max_duration"
    id: p2_max_duration
    min_value: 0
    max_value: 300
    step: 1
    unit_of_measurement: s
    optimistic: true
    restore_value: true
    initial_value: 300
    on_value:
      - globals.set:
          id: g_p2_max
          value: !lambda 'return x;'

  - platform: template
    name: "p3_max_duration"
    id: p3_max_duration
    min_value: 0
    max_value: 300
    step: 1
    unit_of_measurement: s
    optimistic: true
    restore_value: true
    initial_value: 300
    on_value:
      - globals.set:
          id: g_p3_max
          value: !lambda 'return x;'

  - platform: template
    name: "p4_max_duration"
    id: p4_max_duration
    min_value: 0
    max_value: 300
    step: 1
    unit_of_measurement: s
    optimistic: true
    restore_value: true
    initial_value: 300
    on_value:
      - globals.set:
          id: g_p4_max
          value: !lambda 'return x;'

# ----------------------------------------------------------------
#  Sensors exposés dans Home Assistant
# ----------------------------------------------------------------
sensor:
  - platform: uptime
    name: "Uptime"
    update_interval: 60s
    icon: "mdi:clock-start"

  - platform: wifi_signal
    name: "WiFi"
    update_interval: 60s
    icon: "mdi:wifi"

# ----------------------------------------------------------------
#  Infos texte exposées dans Home Assistant
# ----------------------------------------------------------------
text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP"
      icon: "mdi:ip-network"
    ssid:
      name: "SSID"
      icon: "mdi:router-wireless"

  - platform: version
    name: "Version ESPHome"
    icon: "mdi:information"
