            card_mod:
              style: |
                ha-card { margin: 16px 32px 8px 32px; }

          - type: custom:mini-graph-card
            title: "Niveaux reservoirs - 7 derniers jours"
            hours_to_show: 168
            points_per_hour: 1
            line_width: 2
            show:
              legend: true
              fill: true
            entities:
              - entity: input_number.dmd_p1_tank_remaining
                color: *kh_color
              - entity: input_number.dmd_p2_tank_remaining
                color: *ca_color
              - entity: input_number.dmd_p3_tank_remaining
                color: *mg_color
              - entity: input_number.dmd_p4_tank_remaining
                color: *ph_color
            card_mod:
              style: |
                ha-card { margin: 0 32px 16px 32px; }

          - type: markdown
            content: |
              ### Reset complet
              Ce bouton remet a zero **toutes les statistiques** :
              - Volumes doses (semaine / mois / annee / total)
              - Compteurs de doses reussies et manquees
              - Volumes restants dans les reservoirs
              - Dates des dernieres doses

              La **calibration est conservee** (debits calcules).

              Pour effacer le graphique, reduire la retention
              dans Parametres → Systeme → Reparer.
            card_mod:
              style: |
                ha-card { margin: 0 32px 0 32px; }

          - type: button
            name: "Reset complet DIY my Dose"
            icon: mdi:trash-can
            icon_height: 40px
            action_name: "RESET"
            tap_action:
              action: call-service
              service: script.dmd_reset_all
              confirmation:
                text: "Attention ! Ceci va remettre a zero : volumes doses, compteurs de doses, doses manquees, volumes restants reservoirs et dates des dernieres doses. La calibration est conservee. Etes-vous sur ?"
            card_mod:
              style: |
                ha-card {
                margin: 8px 32px 16px 32px;
                background: rgba(231, 76, 60, 0.15);
                border: 2px solid #e74c3c;
                color: #e74c3c;
                }
