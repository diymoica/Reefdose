##################################################################################################################################
#  VUE 2 : REGLAGES
##################################################################################################################################

  - title: Reglages
    path: reglages
    icon: mdi:cog
    panel: true
    cards:
      - type: vertical-stack
        cards:

          - type: conditional
            conditions:
              - condition: state
                entity: binary_sensor.dmd_status
                state: "off"
            card:
              type: markdown
              content: >-
                ## 🚀 Checklist de démarrage

                Suivez ces étapes dans l'ordre pour configurer DIY my Dose correctement.

                **Étape 1 — Notifications**
                Configurez `config/packages/common/notify.yaml` avec votre identifiant d'appareil mobile.
                Ensuite testez via le bouton **↳ Tester les notifications** dans Réglages → Global.

                **Étape 2 — Calibration des pompes**
                Pour chaque pompe : activez le mode calibration, lancez 60 secondes, mesurez le volume collecté
                et entrez-le dans le champ "Volume recueilli". La durée de dose se calculera automatiquement.

                **Étape 3 — Configuration du dosage**
                Définissez pour chaque pompe : la dose quotidienne (ml), le nombre de doses par jour,
                le volume du bidon et le seuil d'alerte. Vérifiez que "Configuration invalide" affiche **OK**.

                **Étape 4 — Compatibilité chimique**
                Si certains produits ne doivent pas être mélangés, définissez des délais par paire
                dans la section **Compatibilité des pompes** ci-dessous.

                **Étape 5 — Mode simulation**
                Activez le mode simulation et laissez tourner quelques cycles pour vérifier que toutes
                les pompes se déclenchent. Désactivez ensuite pour passer en production.
              card_mod:
                style: |
                  ha-card {
                  background: rgba(33, 150, 243, 0.05);
                  border-left: 4px solid #2196F3;
                  margin-bottom: 8px;
                  }

          - type: entities
            title: "Global"
            show_header_toggle: false
            entities:
              - entity: input_number.dmd_dose_delay
                name: "Délai mécanique entre doses (s)"

              - type: custom:mushroom-template-card
                primary: "Mode simulation"
                secondary: >-
                  {% if is_state('input_boolean.dmd_sim_mode', 'on') %}
                    ⚠️ ACTIF — doses toutes les {{ states('input_number.dmd_sim_interval') | int }} min, stats protégées
                  {% else %}
                    Désactivé — fonctionnement normal
                  {% endif %}
                icon: mdi:flask-outline
                icon_color: >-
                  {% if is_state('input_boolean.dmd_sim_mode', 'on') %}red{% else %}grey{% endif %}
                entity: input_boolean.dmd_sim_mode
                tap_action:
                  action: toggle
                layout: horizontal
              - type: custom:mushroom-template-card
                primary: "↳ Intervalle"
                secondary: "{{ states('input_number.dmd_sim_interval') | int }} min entre chaque dose simulée"
                icon: mdi:timer-outline
                icon_color: grey
                tap_action:
                  action: more-info
                  entity: input_number.dmd_sim_interval
                hold_action:
                  action: more-info
                  entity: input_number.dmd_sim_interval
                card_mod:
                  style: >
                    ha-card {
                      margin-left: 24px;
                      {% if not is_state('input_boolean.dmd_sim_mode', 'on') %}display: none;{% endif %}
                    }
              - type: custom:mushroom-template-card
                primary: "↳ Déclencher les vraies pompes"
                secondary: >-
                  {% if is_state('input_boolean.dmd_sim_real_pumps', 'on') %}
                    Oui — les pompes tournent réellement
                  {% else %}
                    Non — simulation logique uniquement
                  {% endif %}
                card_mod:
                  style: >
                    ha-card {
                      margin-left: 24px;
                      {% if not is_state('input_boolean.dmd_sim_mode', 'on') %}display: none;{% endif %}
                    }
                icon: mdi:pump
                icon_color: >-
                  {% if is_state('input_boolean.dmd_sim_real_pumps', 'on') %}orange{% else %}grey{% endif %}
                entity: input_boolean.dmd_sim_real_pumps
                tap_action:
                  action: toggle
                layout: horizontal

              - type: custom:mushroom-template-card
                primary: "↳ Tester les notifications"
                secondary: "Envoie un message de test sur votre appareil"
                icon: mdi:bell-ring-outline
                icon_color: blue
                tap_action:
                  action: call-service
                  service: script.dmd_test_notification
                layout: horizontal
                card_mod:
                  style: |
                    ha-card { margin-left: 24px; }

          - type: markdown
            content: '## 🛡️ Sécurité — watchdog v1.0.7'
            card_mod:
              style: |
                ha-card {
                background: rgba(255, 152, 0, 0.06);
                border-left: 4px solid #FF9800;
                padding: 4px 8px;
                }
          - type: conditional
            conditions:
              - condition: state
                entity: input_boolean.dmd_safety_locked
                state: 'on'
            card:
              type: custom:mushroom-template-card
              primary: "🔒 SYSTÈME VERROUILLÉ"
              secondary: >-
