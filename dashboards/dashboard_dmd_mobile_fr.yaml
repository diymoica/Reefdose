##################################################################################################################################
#  VUE 2 : REGLAGES
##################################################################################################################################

  - title: Reglages
    path: reglages
    icon: mdi:cog
    cards:

      - type: entities
        title: "Global"
        show_header_toggle: false
        entities:
          - entity: input_number.dmd_dose_delay
            name: "Délai mécanique entre doses (s)"


      - type: markdown
        content: '## 🛡️ Sécurité — watchdog v1.0.7'
        card_mod:
          style: |
            ha-card {
            background: rgba(255, 152, 0, 0.06);
            border-left: 4px solid #FF9800;
            padding: 4px 8px;
            }
      - type: conditional
        conditions:
          - condition: state
            entity: input_boolean.dmd_safety_locked
            state: 'on'
        card:
          type: custom:mushroom-template-card
          primary: "🔒 SYSTÈME VERROUILLÉ"
          secondary: Vérifiez les pompes avant de déverrouiller.
          icon: mdi:lock-alert
          icon_color: red
          tap_action:
            action: call-service
            service: input_boolean.turn_off
            service_data:
              entity_id: input_boolean.dmd_safety_locked
            confirmation:
              text: "Avez-vous vérifié les pompes et le bac ?"
          card_mod:
            style: |
              ha-card {
              background: rgba(231, 76, 60, 0.15);
              border: 2px solid #e74c3c;
              }
      - type: entities
        title: "Multiplicateurs watchdog"
        card_mod:
          style: |
            ha-card { border-left: 4px solid #FF9800; }
        entities:
          - type: custom:mushroom-template-card
            primary: Hiérarchie watchdog
            secondary: >-
              {% set s = states('sensor.dmd_safety_config_ok') %}
              {% if s == 'OK' %}✅ Valide (soft < hard < ESP32 < verrou)
              {% else %}⚠️ {{ s }}{% endif %}
            icon: >-
              {% if states('sensor.dmd_safety_config_ok') == 'OK' %}mdi:shield-check
              {% else %}mdi:shield-off{% endif %}
            icon_color: >-
              {% if states('sensor.dmd_safety_config_ok') == 'OK' %}green
              {% else %}red{% endif %}
            layout: horizontal
          - entity: input_number.dmd_safety_soft_mult
            name: Soft (×dose)
          - entity: input_number.dmd_safety_hard_mult
            name: Hard (×dose)
          - entity: input_number.dmd_safety_esp32_mult
            name: ESP32 (×dose)
          - entity: input_number.dmd_safety_lock_mult
            name: Verrou (×dose)
          - type: custom:mushroom-template-card
            primary: Timeouts P1
            secondary: >-
              Soft {{ states('sensor.dmd_p1_soft_timeout') }}s /
              Hard {{ states('sensor.dmd_p1_hard_timeout') }}s /
              ESP32 {{ states('sensor.dmd_p1_esp32_timeout') }}s /
              Verrou {{ states('sensor.dmd_p1_lock_timeout') }}s
            icon: mdi:timer-outline
            icon_color: grey
            layout: horizontal
      - type: markdown
        content: >-
          **Compatibilité des pompes**

          Certains produits ne doivent pas être mélangés simultanément (ex: calcium et carbonate).
          Définissez ici un délai minimum (en minutes) entre deux pompes.
          DIY my Dose attendra automatiquement ce délai avant de déclencher la deuxième pompe.
          **0 = pas de délai** (dosage simultané autorisé).
        card_mod:
          style: |
            ha-card {
            background: rgba(255,255,255,0.03);
            border-left: 4px solid #888;
            font-size: 13px;
            padding: 4px 8px;
            }

      - type: entities
        title: "Compatibilite des pompes"
        card_mod:
          style: |
            ha-card { border-left: 4px solid #888; }
        entities:
          - entity: input_number.dmd_delay_p1_p2
            name: "Pompe 1 → Pompe 2 (min)"
          - entity: input_number.dmd_delay_p1_p3
            name: "Pompe 1 → Pompe 3 (min)"
          - entity: input_number.dmd_delay_p2_p3
            name: "Pompe 2 → Pompe 3 (min)"
          - entity: input_number.dmd_delay_p1_p4
            name: "Pompe 1 → Pompe 4 (min)"
          - entity: input_number.dmd_delay_p2_p4
            name: "Pompe 2 → Pompe 4 (min)"
          - entity: input_number.dmd_delay_p3_p4
            name: "Pompe 3 → Pompe 4 (min)"

      - type: horizontal-stack
        cards:
          - type: vertical-stack
            cards:
              - type: markdown
                content: >-
                  {{ states('input_text.dmd_p1_name') | default('Pompe 1') }}
                card_mod:
                  style: |
                    ha-card {
                    background: var(--p1-bg);
                    border-left: 4px solid var(--p1-color);
                    padding: 4px 8px;
                    }
              - type: entities
                entities:
                  - entity: input_text.dmd_p1_name
                    name: Nom de la pompe
                  - entity: input_number.dmd_p1_daily_dose
                    name: Dose quotidienne (ml)
                  - entity: input_number.dmd_p1_frequency
                    name: Doses par jour
                  - type: custom:mushroom-template-card
                    primary: "Decaler le planning apres une dose manuelle ?"
                    secondary: >-
                      {% if is_state('input_boolean.dmd_p1_manual_resets_cycle', 'on') %}
                        Oui — l'auto repart depuis cette dose (ex: dose a 14h30 → prochaine a 14h30 + intervalle)
                      {% else %}
                        Non — l'auto continue son planning (ex: dose a 14h30 → prochaine auto a 15h00 comme prevu)
                      {% endif %}
                    icon: >-
                      {% if is_state('input_boolean.dmd_p1_manual_resets_cycle', 'on') %}
                        mdi:restart-alert
                      {% else %}
                        mdi:calendar-clock
                      {% endif %}
                    icon_color: >-
                      {% if is_state('input_boolean.dmd_p1_manual_resets_cycle', 'on') %}
                        orange
                      {% else %}
                        grey
                      {% endif %}
                    entity: input_boolean.dmd_p1_manual_resets_cycle
                    tap_action:
                      action: toggle
                    layout: horizontal
                  - entity: input_boolean.dmd_p1_full_day
                    name: "Journee entiere (0h00-minuit)"
                  - type: conditional
                    conditions:
                      - entity: input_boolean.dmd_p1_full_day
                        state: 'off'
                    row:
                      entity: input_datetime.dmd_p1_start_time
                      name: Heure de depart
                  - type: conditional
                    conditions:
                      - entity: input_boolean.dmd_p1_full_day
                        state: 'off'
                    row:
                      entity: input_datetime.dmd_p1_end_time
                      name: Heure de fin
                  - entity: sensor.dmd_p1_interval_min
                    name: Intervalle (min)
                  - entity: sensor.dmd_p1_window_ok
                    name: Configuration invalide
                  - entity: sensor.dmd_p1_next_dose
                    name: Prochaine dose
                  - entity: input_number.dmd_p1_tank_volume
                    name: Volume reservoir (ml)
                  - entity: input_number.dmd_p1_tank_remaining
                    name: Volume restant (ml)
                  - type: custom:mushroom-template-card
                    primary: "Plein fait !"
                    icon: mdi:barrel
                    icon_color: var(--p1-color)
                    tap_action:
                      action: call-service
                      service: script.dmd_tank_full_p1
                    layout: horizontal
                  - entity: input_number.dmd_p1_alert_threshold
                    name: Seuil alerte (ml)
                card_mod:
                  style: |
                    ha-card { border-left: 4px solid var(--p1-color); }
              - type: markdown
                content: >-
                  Calibration — {{ states('input_text.dmd_p1_name') | default('Pompe 1') }}
                card_mod:
                  style: |
                    ha-card {
                    background: var(--p1-bg);
                    border-left: 4px solid var(--p1-color);
                    padding: 4px 8px;
                    }
              - type: entities
                entities:
                  - entity: input_boolean.dmd_p1_calib_mode
                    name: "1. Activer"
                  - entity: input_number.dmd_p1_calib_duration
                    name: "2. Duree (s)"
                  - entity: input_boolean.dmd_p1_calib_start
