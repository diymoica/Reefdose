##################################################################################################################################
#  VUE 2 : REGLAGES
##################################################################################################################################

  - title: Settings
    path: reglages
    icon: mdi:cog
    panel: true
    cards:
      - type: vertical-stack
        cards:

          - type: markdown
            content: >-
              ## 🚀 Setup checklist

              Follow these steps in order to configure DIY my Dose correctly.

              **Step 1 — Notifications**
              Configure `config/packages/common/notify.yaml` with your mobile device identifier.
              Then test using the **↳ Test notifications** button in Settings → Global.

              **Step 2 — Pump calibration**
              For each pump: enable calibration mode, run for 60 seconds, measure the collected volume
              and enter it in the "Collected volume" field. Dose duration will be calculated automatically.

              **Step 3 — Dosing configuration**
              Set for each pump: daily dose (ml), doses per day, tank volume and alert threshold.
              Verify that "Invalid config" shows **OK**.

              **Step 4 — Safety**
              Review the **Safety — watchdog** section below. Default values (×2 / ×3           - type: markdown
            content: '## 🛡️ Safety — watchdog v1.0.7'
            card_mod:
              style: |
                ha-card {
                background: rgba(255, 152, 0, 0.06);
                border-left: 4px solid #FF9800;
                padding: 4px 8px;
                }
          - type: conditional
            conditions:
              - condition: state
                entity: input_boolean.dmd_safety_locked
                state: 'on'
            card:
              type: custom:mushroom-template-card
              primary: "🔒 SYSTEM LOCKED"
              secondary: >-
                Dosing is suspended. Verify pumps before unlocking.
              icon: mdi:lock-alert
              icon_color: red
              tap_action:
                action: call-service
                service: input_boolean.turn_off
                service_data:
                  entity_id: input_boolean.dmd_safety_locked
                confirmation:
                  text: >-
                    Have you checked the pumps and tank?
                    This will re-enable automatic dosing.
              card_mod:
                style: |
                  ha-card {
                  background: rgba(231, 76, 60, 0.15);
                  border: 2px solid #e74c3c;
                  }
          - type: entities
            title: Safety — watchdog multipliers
            card_mod:
              style: |
                ha-card { border-left: 4px solid #FF9800; }
            entities:
              - type: custom:mushroom-template-card
                primary: Watchdog hierarchy
                secondary: >-
                  {% set s = states('sensor.dmd_safety_config_ok') %}
                  {% if s == 'OK' %}✅ Valid (soft < hard < ESP32 < lock)
                  {% else %}⚠️ {{ s }}{% endif %}
                icon: >-
                  {% if states('sensor.dmd_safety_config_ok') == 'OK' %}mdi:shield-check
                  {% else %}mdi:shield-off{% endif %}
                icon_color: >-
                  {% if states('sensor.dmd_safety_config_ok') == 'OK' %}green
                  {% else %}red{% endif %}
                layout: horizontal
              - type: section
                label: Global multipliers (x dose duration)
              - entity: input_number.dmd_safety_soft_mult
                name: Soft (warning)
              - entity: input_number.dmd_safety_hard_mult
                name: Hard (emergency stop)
              - entity: input_number.dmd_safety_esp32_mult
                name: ESP32 (hardware cut)
              - entity: input_number.dmd_safety_lock_mult
                name: Lock (forced reset)
              - type: section
                label: Calculated timeouts Pump 1 (info)
              - type: custom:mushroom-template-card
                primary: Soft / Hard / ESP32 / Lock
                secondary: >-
                  {{ states('sensor.dmd_p1_soft_timeout') }}s /
                  {{ states('sensor.dmd_p1_hard_timeout') }}s /
                  {{ states('sensor.dmd_p1_esp32_timeout') }}s /
                  {{ states('sensor.dmd_p1_lock_timeout') }}s
                  (dose = {{ states('sensor.dmd_p1_dose_duration') }}s)
                icon: mdi:timer-outline
                icon_color: grey
                layout: horizontal
          - type: conditional
            conditions:
              - condition: state
                entity: input_boolean.dmd_safety_expert_mode
                state: 'on'
            card:
              type: entities
              title: Per-pump overrides (expert mode — 0 = global)
              card_mod:
                style: |
                  ha-card { border-left: 4px solid #FF9800; }
              entities:
                - type: section
                  label: Pump 1
                - entity: input_number.dmd_p1_safety_soft_mult
                  name: Soft override
                - entity: input_number.dmd_p1_safety_hard_mult
                  name: Hard override
                - entity: input_number.dmd_p1_safety_esp32_mult
                  name: ESP32 override
                - entity: input_number.dmd_p1_safety_lock_mult
                  name: Lock override
                - type: section
                  label: Pump 2
                - entity: input_number.dmd_p2_safety_soft_mult
                  name: Soft override
                - entity: input_number.dmd_p2_safety_hard_mult
                  name: Hard override
                - entity: input_number.dmd_p2_safety_esp32_mult
                  name: ESP32 override
                - entity: input_number.dmd_p2_safety_lock_mult
                  name: Lock override
                - type: section
                  label: Pump 3
                - entity: input_number.dmd_p3_safety_soft_mult
                  name: Soft override
                - entity: input_number.dmd_p3_safety_hard_mult
                  name: Hard override
                - entity: input_number.dmd_p3_safety_esp32_mult
                  name: ESP32 override
                - entity: input_number.dmd_p3_safety_lock_mult
                  name: Lock override
                - type: section
                  label: Pump 4
                - entity: input_number.dmd_p4_safety_soft_mult
                  name: Soft override
                - entity: input_number.dmd_p4_safety_hard_mult
                  name: Hard override
                - entity: input_number.dmd_p4_safety_esp32_mult
                  name: ESP32 override
                - entity: input_number.dmd_p4_safety_lock_mult
                  name: Lock override
          - type: markdown
            content: >-
              **Pump compatibility delays**

              Some products must not be dosed simultaneously (e.g. calcium and carbonate).
              Set a minimum delay (in minutes) between two pumps.
              DIY my Dose will automatically wait before triggering the second pump.
              **0 = no delay** (simultaneous dosing allowed).
            card_mod:
              style: |
                ha-card {
                background: rgba(255,255,255,0.03);
                border-left: 4px solid #888;
                font-size: 13px;
                padding: 4px 8px;
                }

          - type: entities
            title: "Pump compatibility"
            card_mod:
              style: |
                ha-card { border-left: 4px solid #888; }
            entities:
              - entity: input_number.dmd_delay_p1_p2
                name: "Pump 1 → Pump 2 (min)"
              - entity: input_number.dmd_delay_p1_p3
                name: "Pump 1 → Pump 3 (min)"
              - entity: input_number.dmd_delay_p2_p3
                name: "Pump 2 → Pump 3 (min)"
              - entity: input_number.dmd_delay_p1_p4
                name: "Pump 1 → Pump 4 (min)"
              - entity: input_number.dmd_delay_p2_p4
                name: "Pump 2 → Pump 4 (min)"
              - entity: input_number.dmd_delay_p3_p4
                name: "Pump 3 → Pump 4 (min)"

          - type: horizontal-stack
            cards:

              - type: vertical-stack
                cards:
                  - type: markdown
                    content: >-
                      {{ states('input_text.dmd_p1_name') | default('Pump 1') }}
                    card_mod:
                      style: |
