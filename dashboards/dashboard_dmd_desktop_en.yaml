  - title: Control
    path: controle
    icon: mdi:pump
    panel: true
    cards:
      - type: vertical-stack
        cards:

          - type: custom:mushroom-template-card
            primary: "⚠️ SIMULATION MODE ACTIVE"
            secondary: "Doses fire every {{ states('input_number.dmd_sim_interval') | int }} min — stats not updated"
            icon: mdi:flask-outline
            icon_color: red
            card_mod:
              style: |
                ha-card {
                background: rgba(231, 76, 60, 0.15);
                border: 2px solid #e74c3c;
                margin: 8px 32px 0 32px;
                display: {{ 'block' if is_state('input_boolean.dmd_sim_mode', 'on') else 'none' }};
                }
            tap_action:
              action: none
          - type: horizontal-stack
            cards:
              - type: conditional
                conditions:
                  - condition: state
                    entity: input_boolean.dmd_safety_locked
                    state: 'on'
                card:
                  type: custom:mushroom-template-card
                  primary: "🔒 SYSTEM LOCKED — Dosing suspended"
                  secondary: >-
                    Go to Settings > Safety to unlock after verification.
                  icon: mdi:lock-alert
                  icon_color: red
                  card_mod:
                    style: |
                      ha-card {
                      background: rgba(231, 76, 60, 0.15);
                      border: 2px solid #e74c3c;
                      margin: 8px 32px 0 32px;
                      }
                  tap_action:
                    action: none
              - type: custom:mushroom-template-card
                primary: DIY my Dose
                secondary: "{{ states('sensor.dmd_status') }}"
                icon: mdi:server-network
                icon_color: >-
                  {% if is_state('binary_sensor.dmd_status', 'on') %}green{% else %}red{% endif %}
                tap_action:
                  action: none
              - type: custom:mushroom-entity-card
                entity: input_boolean.dmd_pause
                name: "Pause all pumps"
                icon: mdi:pause-circle
                tap_action:
                  action: toggle
              - type: custom:mushroom-entity-card
                entity: input_boolean.dmd_dosing
                name: "Dosing in progress"
                icon: mdi:lock
                tap_action:
                  action: none
            card_mod:
              style: |
                ha-card { margin: 16px 32px 0 32px; }

          - type: custom:bar-card
            title: "Reservoir levels (%)"
            entities:
              - entity: sensor.dmd_p1_tank_pct
                color: *kh_color
              - entity: sensor.dmd_p2_tank_pct
                color: *ca_color
              - entity: sensor.dmd_p3_tank_pct
                color: *mg_color
              - entity: sensor.dmd_p4_tank_pct
                color: *ph_color
            columns: 4
            height: 100px
            positions:
              icon: "off"
              name: inside
              value: inside
            card_mod:
              style: |
                ha-card { margin: 8px 32px; }

