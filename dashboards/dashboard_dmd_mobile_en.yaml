  - title: Control
    path: controle
    icon: mdi:pump
    cards:

      - type: conditional
        conditions:
          - condition: state
            entity: input_boolean.dmd_safety_locked
            state: 'on'
        card:
          type: custom:mushroom-template-card
          primary: "🔒 SYSTEM LOCKED — Dosing suspended"
          secondary: Go to Settings > Safety to unlock.
          icon: mdi:lock-alert
          icon_color: red
          card_mod:
            style: |
              ha-card {
              background: rgba(231, 76, 60, 0.15);
              border: 2px solid #e74c3c;
              }
          tap_action:
            action: none
      - type: custom:mushroom-template-card
        primary: DIY my Dose
        secondary: "{{ states('sensor.dmd_status') }}"
        icon: mdi:server-network
        icon_color: >-
          {% if is_state('binary_sensor.dmd_status', 'on') %}green{% else %}red{% endif %}
        tap_action:
          action: none

      - type: horizontal-stack
        cards:
          - type: custom:mushroom-entity-card
            entity: input_boolean.dmd_pause
            name: "Pause all pumps"
            icon: mdi:pause-circle
            tap_action:
              action: toggle
          - type: custom:mushroom-entity-card
            entity: input_boolean.dmd_dosing
            name: "Dosing in progress"
            icon: mdi:lock
            tap_action:
              action: none

      - type: custom:bar-card
        title: "Reservoir levels (%)"
        entities:
          - entity: sensor.dmd_p1_tank_pct
            color: *kh_color
          - entity: sensor.dmd_p2_tank_pct
            color: *ca_color
          - entity: sensor.dmd_p3_tank_pct
            color: *mg_color
          - entity: sensor.dmd_p4_tank_pct
            color: *ph_color
        columns: 2
        height: 40px
        positions:
          icon: "off"
          name: inside
          value: inside

      - type: horizontal-stack
        cards:
          - type: vertical-stack
            cards:
              - type: markdown
                content: >-
                  {{ states('input_text.dmd_p1_name') | default('Pump 1') }}
                card_mod:
                  style: |
                    ha-card {
                    background: var(--p1-bg);
                    border-left: 3px solid var(--p1-color);
                    padding: 2px 8px;
                    font-size: 12px;
                    font-weight: bold;
                    margin-bottom: 0;
                    }
              - type: glance
                show_name: true
                show_state: true
                columns: 2
                entities:
                  - entity: input_number.dmd_p1_tank_remaining
                    name: Remaining (ml)
                  - entity: sensor.dmd_p1_days_remaining
                    name: Days remaining
                card_mod:
                  style: |
                    ha-card { margin-top: 0; }
          - type: vertical-stack
            cards:
              - type: markdown
                content: >-
                  {{ states('input_text.dmd_p2_name') | default('Pump 2') }}
