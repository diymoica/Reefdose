##################################################################################################################################
#  VUE 2 : REGLAGES
##################################################################################################################################

  - title: Settings
    path: reglages
    icon: mdi:cog
    cards:

      - type: entities
        title: "Global"
        show_header_toggle: false
        entities:
          - entity: input_number.dmd_dose_delay
            name: "Mechanical delay between doses (s)"


      - type: markdown
        content: '## 🛡️ Safety — watchdog v1.0.7'
        card_mod:
          style: |
            ha-card {
            background: rgba(255, 152, 0, 0.06);
            border-left: 4px solid #FF9800;
            padding: 4px 8px;
            }
      - type: conditional
        conditions:
          - condition: state
            entity: input_boolean.dmd_safety_locked
            state: 'on'
        card:
          type: custom:mushroom-template-card
          primary: "🔒 SYSTEM LOCKED"
          secondary: Verify pumps before unlocking.
          icon: mdi:lock-alert
          icon_color: red
          tap_action:
            action: call-service
            service: input_boolean.turn_off
            service_data:
              entity_id: input_boolean.dmd_safety_locked
            confirmation:
              text: "Have you checked the pumps and tank?"
          card_mod:
            style: |
              ha-card {
              background: rgba(231, 76, 60, 0.15);
              border: 2px solid #e74c3c;
              }
      - type: entities
        title: "Watchdog multipliers"
        card_mod:
          style: |
            ha-card { border-left: 4px solid #FF9800; }
        entities:
          - type: custom:mushroom-template-card
            primary: Watchdog hierarchy
            secondary: >-
              {% set s = states('sensor.dmd_safety_config_ok') %}
              {% if s == 'OK' %}✅ Valid (soft < hard < ESP32 < lock)
              {% else %}⚠️ {{ s }}{% endif %}
            icon: >-
              {% if states('sensor.dmd_safety_config_ok') == 'OK' %}mdi:shield-check
              {% else %}mdi:shield-off{% endif %}
            icon_color: >-
              {% if states('sensor.dmd_safety_config_ok') == 'OK' %}green
              {% else %}red{% endif %}
            layout: horizontal
          - entity: input_number.dmd_safety_soft_mult
            name: Soft (×dose)
          - entity: input_number.dmd_safety_hard_mult
            name: Hard (×dose)
          - entity: input_number.dmd_safety_esp32_mult
            name: ESP32 (×dose)
          - entity: input_number.dmd_safety_lock_mult
            name: Lock (×dose)
          - type: custom:mushroom-template-card
            primary: Timeouts P1
            secondary: >-
              Soft {{ states('sensor.dmd_p1_soft_timeout') }}s /
              Hard {{ states('sensor.dmd_p1_hard_timeout') }}s /
              ESP32 {{ states('sensor.dmd_p1_esp32_timeout') }}s /
              Lock {{ states('sensor.dmd_p1_lock_timeout') }}s
            icon: mdi:timer-outline
            icon_color: grey
            layout: horizontal
      - type: markdown
        content: >-
          **Pump compatibility delays**

          Some products must not be dosed simultaneously (e.g. calcium and carbonate).
          Set a minimum delay (in minutes) between two pumps.
          DIY my Dose will automatically wait before triggering the second pump.
          **0 = no delay** (simultaneous dosing allowed).
        card_mod:
          style: |
            ha-card {
            background: rgba(255,255,255,0.03);
            border-left: 4px solid #888;
            font-size: 13px;
            padding: 4px 8px;
            }

      - type: entities
        title: "Pump compatibility"
        card_mod:
          style: |
            ha-card { border-left: 4px solid #888; }
        entities:
          - entity: input_number.dmd_delay_p1_p2
            name: "Pump 1 → Pump 2 (min)"
          - entity: input_number.dmd_delay_p1_p3
            name: "Pump 1 → Pump 3 (min)"
          - entity: input_number.dmd_delay_p2_p3
            name: "Pump 2 → Pump 3 (min)"
          - entity: input_number.dmd_delay_p1_p4
            name: "Pump 1 → Pump 4 (min)"
          - entity: input_number.dmd_delay_p2_p4
            name: "Pump 2 → Pump 4 (min)"
          - entity: input_number.dmd_delay_p3_p4
            name: "Pump 3 → Pump 4 (min)"

      - type: horizontal-stack
        cards:
          - type: vertical-stack
            cards:
              - type: markdown
                content: >-
                  {{ states('input_text.dmd_p1_name') | default('Pump 1') }}
                card_mod:
                  style: |
                    ha-card {
                    background: var(--p1-bg);
                    border-left: 4px solid var(--p1-color);
                    padding: 4px 8px;
                    }
              - type: entities
                entities:
                  - entity: input_text.dmd_p1_name
                    name: Pump name
                  - entity: input_number.dmd_p1_daily_dose
                    name: Daily dose (ml)
                  - entity: input_number.dmd_p1_frequency
                    name: Doses per day
                  - type: custom:mushroom-template-card
                    primary: "Shift schedule after a manual dose ?"
                    secondary: >-
                      {% if is_state('input_boolean.dmd_p1_manual_resets_cycle', 'on') %}
                        Yes — auto resumes from this dose (e.g. dose at 14:30 → next at 14:30 + interval)
                      {% else %}
                        No — auto keeps its schedule (e.g. dose at 14:30 → next auto at 15:00 as planned)
                      {% endif %}
                    icon: >-
                      {% if is_state('input_boolean.dmd_p1_manual_resets_cycle', 'on') %}
                        mdi:restart-alert
                      {% else %}
                        mdi:calendar-clock
                      {% endif %}
                    icon_color: >-
                      {% if is_state('input_boolean.dmd_p1_manual_resets_cycle', 'on') %}
                        orange
                      {% else %}
                        grey
                      {% endif %}
                    entity: input_boolean.dmd_p1_manual_resets_cycle
                    tap_action:
                      action: toggle
                    layout: horizontal
                  - entity: input_boolean.dmd_p1_full_day
                    name: "Full day dosing (midnight to midnight)"
                  - type: conditional
                    conditions:
                      - entity: input_boolean.dmd_p1_full_day
                        state: 'off'
                    row:
                      entity: input_datetime.dmd_p1_start_time
                      name: Start time
                  - type: conditional
                    conditions:
                      - entity: input_boolean.dmd_p1_full_day
                        state: 'off'
                    row:
                      entity: input_datetime.dmd_p1_end_time
                      name: End time
                  - entity: sensor.dmd_p1_interval_min
                    name: Interval (min)
                  - entity: sensor.dmd_p1_window_ok
                    name: Invalid configuration
                  - entity: sensor.dmd_p1_next_dose
                    name: Next dose
                  - entity: input_number.dmd_p1_tank_volume
                    name: Reservoir volume (ml)
                  - entity: input_number.dmd_p1_tank_remaining
                    name: Remaining volume (ml)
                  - type: custom:mushroom-template-card
                    primary: "Tank refilled!"
                    icon: mdi:barrel
                    icon_color: var(--p1-color)
                    tap_action:
                      action: call-service
                      service: script.dmd_tank_full_p1
                    layout: horizontal
                  - entity: input_number.dmd_p1_alert_threshold
                    name: Alert threshold (ml)
                card_mod:
                  style: |
                    ha-card { border-left: 4px solid var(--p1-color); }
              - type: markdown
                content: >-
                  Calibration — {{ states('input_text.dmd_p1_name') | default('Pump 1') }}
                card_mod:
                  style: |
                    ha-card {
                    background: var(--p1-bg);
                    border-left: 4px solid var(--p1-color);
                    padding: 4px 8px;
                    }
              - type: entities
                entities:
                  - entity: input_boolean.dmd_p1_calib_mode
                    name: "1. Enable"
                  - entity: input_number.dmd_p1_calib_duration
                    name: "2. Duration (s)"
                  - entity: input_boolean.dmd_p1_calib_start
                    name: "3. Start"
                  - entity: input_number.dmd_p1_calib_volume
                    name: "4. Collected volume (ml)"
                  - entity: sensor.dmd_p1_flow_rate
                    name: "Flow rate (ml/s)"
                card_mod:
                  style: |
                    ha-card { border-left: 4px solid var(--p1-color); }

          - type: vertical-stack
            cards:
              - type: markdown
                content: >-
                  {{ states('input_text.dmd_p2_name') | default('Pump 2') }}
                card_mod:
                  style: |
